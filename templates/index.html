<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAX Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        :root {
            --dark: #0a0f0f;
            --panel: #0f1414;
            --input: #1a1f1f;
            --turquoise: #2a9d8f;
            --turquoise-glass: rgba(42, 157, 143, 0.15);
            --text: #e0e0e0;
            --msg-sent: #2a9d8f;
            --msg-recv: #1e2424;
        }
        
        body { 
            background: var(--dark); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
        }
        
        /* Login Screen */
        .login-overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark); 
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .qr-container {
            background: var(--panel);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid var(--turquoise);
            box-shadow: 0 0 30px rgba(42,157,143,0.2);
        }
        
        .qr-container h1 { color: var(--turquoise); margin-bottom: 1rem; font-size: 3rem; }
        .qr-container input {
            background: var(--input);
            border: 1px solid var(--turquoise);
            color: white;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 2rem;
            width: 100%;
            font-size: 1rem;
        }
        .qr-container button {
            background: var(--turquoise);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        
        /* Layout */
        .sidebar { 
            width: 300px; 
            background: var(--panel); 
            border-right: 1px solid var(--turquoise); 
            display: flex; 
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        
        .sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
            z-index: 100;
            height: 100%;
        }
        
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--dark); 
            position: relative; 
            height: 100vh;
        }
        
        /* Header - УБРАНА ВЕРХНЯЯ ПАНЕЛЬ */
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--turquoise);
            background: var(--dark);
            cursor: pointer;
        }
        
        .sidebar-header h3 {
            color: var(--turquoise);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .current-user {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.3rem;
        }
        
        /* Search */
        .search-box { padding: 0.8rem; border-bottom: 1px solid var(--input); }
        .search-box input {
            width: 100%;
            background: var(--input);
            border: 1px solid var(--turquoise);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            font-size: 0.9rem;
        }
        
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: var(--input);
            border-radius: 1rem;
            margin-top: 0.5rem;
        }
        
        .search-result-item {
            padding: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel);
            cursor: pointer;
        }
        
        .search-result-item:hover {
            background: var(--turquoise-glass);
        }
        
        .add-friend-btn {
            background: var(--turquoise);
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        /* Friends List */
        .friends-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .friend-item {
            padding: 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--turquoise-glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(42, 157, 143, 0.2);
        }
        
        .friend-item:hover { background: rgba(42, 157, 143, 0.25); }
        .friend-item.active { background: var(--turquoise); }
        
        .friend-info { flex: 1; }
        .friend-name { font-weight: 500; margin-bottom: 0.2rem; }
        .online-status { font-size: 0.75rem; opacity: 0.7; display: flex; align-items: center; gap: 0.3rem; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; }
        .online-dot.online { background: var(--turquoise); }
        .online-dot.offline { background: #666; }
        
        /* Messages */
        .messages-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 1rem; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem;
            min-height: 0;
        }
        
        .message {
            max-width: 70%;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 0.95rem;
        }
        
        .message.own {
            align-self: flex-end;
            background: var(--msg-sent);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        
        .message.other {
            align-self: flex-start;
            background: var(--msg-recv);
            color: var(--text);
            border-bottom-left-radius: 0.25rem;
        }
        
        .message .name {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }
        
        .message img { max-width: 100%; border-radius: 0.8rem; margin-top: 0.3rem; display: block; }
        .message video { max-width: 180px; border-radius: 0.8rem; margin-top: 0.3rem; }
        .message audio { margin-top: 0.3rem; max-width: 180px; }
        
        .msg-meta {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.3rem;
        }
        
        .ticks { color: #4fc3f7; font-weight: bold; }
        
        /* Input Area - FIXED AT BOTTOM */
        .input-area {
            padding: 0.5rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--turquoise);
            background: var(--panel);
            flex-shrink: 0;
        }
        
        .attach-btn {
            background: var(--input);
            border: none;
            font-size: 1.2rem;
            border-radius: 50%;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .attach-btn:hover { background: var(--turquoise-glass); }
        
        #msg-input {
            flex: 1;
            background: var(--input);
            border: 1px solid var(--turquoise);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.95rem;
            height: 40px;
            outline: none;
        }
        
        .media-buttons { display: flex; gap: 0.3rem; }
        
        .media-btn {
            background: var(--input);
            border: none;
            font-size: 1rem;
            border-radius: 50%;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .media-btn:hover { background: var(--turquoise-glass); transform: scale(1.05); }
        
        #send-btn {
            background: var(--turquoise);
            color: white;
            font-weight: bold;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        #send-btn:hover { background: #248a7d; transform: scale(1.05); }
        #send-btn:disabled { background: #3a4a4a; color: #666; cursor: not-allowed; transform: none; }
        
        .empty-state { text-align: center; padding: 2rem; color: #666; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                z-index: 30;
                border-right: none;
            }
            .sidebar.open { transform: translateX(0); }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-overlay">
        <div class="qr-container">
            <h1>📠 FAX</h1>
            <div id="qrcode"></div>
            <input type="text" id="username-input" placeholder="Enter your name" maxlength="20">
            <button id="manual-login">Join Chat</button>
            <p style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.7;">Or scan QR from another device</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container" style="display: none; width: 100%; height: 100%;">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header" onclick="toggleSidebar()">
                <h3>📠 FAX</h3>
                <div class="current-user" id="current-user-name"></div>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search users...">
                <div id="search-results" class="search-results" style="display: none;"></div>
            </div>
            
            <div class="friends-list" id="friends-list">
                <div class="empty-state">No friends yet. Search and add!</div>
            </div>
        </div>

        <!-- Chat Area - БЕЗ ВЕРХНЕЙ ПАНЕЛИ -->
        <div class="chat-area">
            <div class="messages-container" id="messages">
                <div class="empty-state">Choose a friend to start messaging</div>
            </div>
            
            <!-- Input Area - ALWAYS VISIBLE AT BOTTOM -->
            <div class="input-area">
                <button class="attach-btn" id="attach-file" title="Attach file">📎</button>
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off" disabled>
                <div class="media-buttons">
                    <button id="record-btn" class="media-btn" title="Hold to record">🎤</button>
                    <button id="send-btn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let user = null;
        let currentChatId = null;
        let currentChatName = '';
        let isVideoMode = false;
        let isRecording = false;
        let mediaRecorder = null;
        let chunks = [];

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const sidebar = document.getElementById('sidebar');
        const currentUserName = document.getElementById('current-user-name');
        const friendsList = document.getElementById('friends-list');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const recordBtn = document.getElementById('record-btn');
        const sendBtn = document.getElementById('send-btn');
        const attachBtn = document.getElementById('attach-file');

        // Login
        document.getElementById('manual-login').onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username) { alert('Please enter your name'); return; }
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username})
            });
            const data = await res.json();
            
            user = data;
            currentUserName.innerText = username;
            loginScreen.style.display = 'none';
            appContainer.style.display = 'flex';
            socket.emit('register', {user_id: user.user_id, username: user.username});
        };

        // Toggle Sidebar
        function toggleSidebar() {
            if (window.innerWidth <= 600) {
                sidebar.classList.toggle('open');
            } else {
                sidebar.classList.toggle('hidden');
            }
        }

        // Search Users
        let searchTimeout;
        searchInput.addEventListener('input', async () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();
            
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const res = await fetch('/api/search_users', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query, user_id: user.user_id})
                });
                const users = await res.json();
                
                searchResults.style.display = 'block';
                if (users.length === 0) {
                    searchResults.innerHTML = '<div class="search-result-item">No users found</div>';
                } else {
                    searchResults.innerHTML = users.map(u => `
                        <div class="search-result-item" onclick="openChatDirect('${u.id}', '${u.username}')">
                            <div>
                                <strong>${u.username}</strong>
                                <div style="font-size:0.75rem">${u.online ? '🟢 Online' : '⚫ Offline'}</div>
                            </div>
                            ${!u.is_friend ? 
                                `<button class="add-friend-btn" onclick="event.stopPropagation(); addFriend('${u.id}', '${u.username}')">Add</button>` : 
                                '<span style="font-size:0.75rem; color:#888">✓ Friend</span>'}
                        </div>
                    `).join('');
                }
            }, 500);
        });

        // Add Friend and Open Chat
        window.addFriend = async (friendId, friendName) => {
            event.stopPropagation();
            await fetch('/api/add_friend', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.user_id, friend_id: friendId})
            });
            searchInput.value = '';
            searchResults.style.display = 'none';
            // Сразу открываем чат с добавленным другом
            openChatDirect(friendId, friendName);
        };

        // Open Chat Directly (from search or friends list)
        window.openChatDirect = (friendId, friendName) => {
            currentChatId = friendId;
            currentChatName = friendName;
            msgInput.disabled = false;
            msgInput.placeholder = `Message to ${friendName}...`;
            
            if (window.innerWidth <= 600) {
                sidebar.classList.remove('open');
            }
            
            socket.emit('get_messages', {user_id: user.user_id, other_user_id: friendId});
            updateButtons();
        };

        // Friends List
        socket.on('friends_list', (friends) => {
            if (friends.length === 0) {
                friendsList.innerHTML = '<div class="empty-state">No friends yet. Search and add!</div>';
                return;
            }
            
            friendsList.innerHTML = friends.map(f => `
                <div class="friend-item ${currentChatId === f.id ? 'active' : ''}" onclick="openChatDirect('${f.id}', '${f.username}')">
                    <div class="friend-info">
                        <div class="friend-name">${f.username}</div>
                        <div class="online-status">
                            <span class="online-dot ${f.online ? 'online' : 'offline'}"></span>
                            ${f.online ? 'Online' : 'Offline'}
                        </div>
                    </div>
                </div>
            `).join('');
        });

        // Messages
        socket.on('messages_history', (msgs) => {
            messagesDiv.innerHTML = '';
            if (msgs.length === 0) {
                messagesDiv.innerHTML = `<div class="empty-state">Start conversation with ${currentChatName}</div>`;
            } else {
                msgs.forEach(addMessageToUI);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        socket.on('new_private_message', (data) => {
            const msg = data.message;
            if (document.getElementById(msg.id)) return;
            addMessageToUI(msg);
        });

        socket.on('message_deleted_client', (data) => {
            const el = document.getElementById(data.message_id);
            if (el) el.remove();
        });

        function addMessageToUI(msg) {
            if (document.getElementById(msg.id)) return;
            
            const isOwn = msg.from_id === user.user_id;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            div.id = msg.id;
            
            let content = '';
            if (msg.type === 'text') content = escapeHtml(msg.content);
            else if (msg.type === 'image') content = `<img src="${msg.content}">`;
            else if (msg.type === 'video') content = `<video src="${msg.content}" controls></video>`;
            else if (msg.type === 'voice') content = `<audio src="${msg.content}" controls></audio>`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const ticks = isOwn ? (msg.read ? '<span class="ticks">✔✔</span>' : '<span class="ticks">✔</span>') : '';
            
            div.innerHTML = `
                ${!isOwn ? `<div class="name">${escapeHtml(msg.from)}</div>` : ''}
                ${content}
                <div class="msg-meta">${time} ${ticks}</div>
            `;
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Send Message
        function sendMessage() {
            if (!msgInput.value.trim() || !currentChatId) return;
            
            socket.emit('private_message', {
                from_user_id: user.user_id,
                to_user_id: currentChatId,
                message: {type: 'text', content: msgInput.value}
            });
            
            msgInput.value = '';
            updateButtons();
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        msgInput.addEventListener('input', updateButtons);

        function updateButtons() {
            const hasText = msgInput.value.trim().length > 0;
            sendBtn.disabled = !hasText || !currentChatId;
            recordBtn.style.display = hasText ? 'none' : 'flex';
        }

        // Attach File
        attachBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,*/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file || !currentChatId) return;
                
                const formData = new FormData();
                formData.append('file', file);
                
                const res = await fetch('/upload', {method: 'POST', body: formData});
                const data = await res.json();
                
                if (data.url) {
                    const type = file.type.startsWith('image/') ? 'image' : 'file';
                    socket.emit('private_message', {
                        from_user_id: user.user_id,
                        to_user_id: currentChatId,
                        message: {type, content: data.url}
                    });
                }
            };
            input.click();
        };

        // Record Button (Toggle between voice/video)
        recordBtn.onclick = () => {
            if (!isRecording) {
                isVideoMode = !isVideoMode;
                recordBtn.innerHTML = isVideoMode ? '📹' : '🎤';
            }
        };

        const startRecording = async (e) => {
            e.preventDefault();
            if (isRecording || !currentChatId) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: isVideoMode
                });
                
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, {type: isVideoMode ? 'video/webm' : 'audio/webm'});
                    const formData = new FormData();
                    formData.append('file', blob, isVideoMode ? 'video.webm' : 'audio.webm');
                    
                    const res = await fetch('/upload', {method: 'POST', body: formData});
                    const data = await res.json();
                    
                    if (data.url) {
                        socket.emit('private_message', {
                            from_user_id: user.user_id,
                            to_user_id: currentChatId,
                            message: {
                                type: isVideoMode ? 'video' : 'voice',
                                content: data.url
                            }
                        });
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordBtn.style.background = '#e74c3c';
            } catch (err) {
                alert('Permission denied');
            }
        };

        const stopRecording = () => {
            if (isRecording && mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.style.background = '';
            }
        };

        recordBtn.onmousedown = startRecording;
        recordBtn.onmouseup = stopRecording;
        recordBtn.onmouseleave = stopRecording;
        recordBtn.ontouchstart = startRecording;
        recordBtn.ontouchend = stopRecording;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load QR
        async function loadQR() {
            try {
                const res = await fetch('/api/qr');
                const data = await res.json();
                const img = document.createElement('img');
                img.src = data.qr;
                document.getElementById('qrcode').appendChild(img);
            } catch(e) {}
        }
        
        loadQR();
    </script>
</body>
</html>
