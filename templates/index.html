<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>FAX Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0a0f0f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Экран входа */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0f;
            z-index: 100;
        }

        .login-box {
            background: #1a1f1f;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid #2a9d8f;
            width: 90%;
            max-width: 350px;
        }

        .login-box h1 {
            color: #2a9d8f;
            margin-bottom: 1rem;
        }

        .login-box input {
            background: #1e2a2a;
            border: 1px solid #2a9d8f;
            color: white;
            padding: 0.75rem;
            border-radius: 2rem;
            width: 100%;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .login-box button {
            background: #2a9d8f;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        /* Основное приложение */
        #app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .friends-panel {
            width: 280px;
            background: #0f1414;
            border-right: 1px solid #2a9d8f;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }

        .friends-header {
            padding: 1rem;
            border-bottom: 1px solid #2a9d8f;
            background: #0a0f0f;
            cursor: pointer;
        }

        .friends-header h3 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .current-user {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.3rem;
        }

        .search-box {
            padding: 0.8rem;
            border-bottom: 1px solid #1e2a2a;
        }

        .search-box input {
            width: 100%;
            background: #1a1f1f;
            border: 1px solid #2a9d8f;
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: #1a1f1f;
            border-radius: 1rem;
            margin-top: 0.5rem;
        }

        .search-result-item {
            padding: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e2a2a;
        }

        .add-friend-btn {
            background: #2a9d8f;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .friend-item {
            padding: 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .friend-item:hover {
            background: #1e2a2a;
        }

        .friend-item.active {
            background: #2a9d8f;
            color: white;
        }

        .friend-name {
            font-weight: 500;
        }

        .online-status {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }

        .online-dot.online {
            background: #2a9d8f;
        }

        .online-dot.offline {
            background: #666;
        }

        .remove-friend-small {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.4rem;
            border-radius: 1rem;
        }

        /* ПРАВАЯ ПАНЕЛЬ */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0a0f0f;
            height: 100%;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid #2a9d8f;
            background: #0f1414;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h4 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .back-btn {
            display: none;
            background: #1e2a2a;
            border: none;
            color: #2a9d8f;
            font-size: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
        }

        .remove-friend-btn {
            background: #e74c3c;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message {
            max-width: 70%;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            word-wrap: break-word;
            font-size: 0.9rem;
        }

        .message.own {
            align-self: flex-end;
            background: #2a9d8f;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.other {
            align-self: flex-start;
            background: #1e2424;
            border-bottom-left-radius: 0.25rem;
        }

        .message .name {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: #2a9d8f;
            font-style: italic;
            padding: 0.2rem 1rem;
            background: #0a0f0f;
            flex-shrink: 0;
        }

        /* НИЖНЯЯ ПАНЕЛЬ - ВСЕГДА ВИДИМА */
        .input-area {
            padding: 0.6rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid #2a9d8f;
            background: #0f1414;
            flex-shrink: 0;
            min-height: 60px;
        }

        .attach-btn {
            background: #1e2a2a;
            border: none;
            font-size: 1.2rem;
            border-radius: 50%;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #message-input {
            flex: 1;
            background: #1a1f1f;
            border: 1px solid #2a9d8f;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 1rem;
            height: 42px;
            outline: none;
        }

        .action-btn {
            background: #2a9d8f;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        /* Мобильные стили */
        @media (max-width: 600px) {
            .friends-panel {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                z-index: 30;
                transition: transform 0.3s ease;
            }

            .friends-panel.open {
                transform: translateX(0);
            }

            .back-btn {
                display: block;
            }

            .mobile-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 25;
            }

            .mobile-overlay.show {
                display: block;
            }

            .attach-btn,
            .action-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }

            #message-input {
                height: 38px;
                font-size: 14px;
                padding: 0.5rem 0.8rem;
            }

            .input-area {
                padding: 0.5rem;
                gap: 0.4rem;
                min-height: 54px;
            }
        }

        @media (min-width: 601px) {
            .back-btn {
                display: none;
            }
        }

        .mobile-overlay {
            display: none;
        }
    </style>
</head>
<body>
    <div id="mobile-overlay" class="mobile-overlay"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1>📠 FAX</h1>
            <input type="text" id="username-input" placeholder="Your name" maxlength="20">
            <button id="join-btn">Join Chat</button>
        </div>
    </div>

    <div id="app-container" style="display:none">
        <div id="friends-panel" class="friends-panel">
            <div class="friends-header" id="friends-header">
                <h3>📠 FAX</h3>
                <div class="current-user" id="current-user-name"></div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search users by name...">
                <div id="search-results" class="search-results" style="display: none;"></div>
            </div>
            <div class="friends-list" id="friends-list">
                <div class="empty-state">No friends yet. Search and add!</div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <button id="back-btn" class="back-btn">← Back</button>
                <h4 id="selected-chat-name">Select a chat</h4>
                <button id="remove-friend-btn" class="remove-friend-btn" style="display: none;">Remove</button>
            </div>

            <div class="messages-area" id="messages-area">
                <div class="empty-state">Choose a friend to start messaging</div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;"></div>

            <!-- НИЖНЯЯ ПАНЕЛЬ - ВСЕГДА ВИДИМА -->
            <div class="input-area">
                <button id="attach-btn" class="attach-btn" title="Attach file">📎</button>
                <input type="text" id="message-input" placeholder="Message..." autocomplete="off" disabled>
                <button id="send-btn" class="action-btn" title="Send message">➤</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        let currentUser = null;
        let currentChatUser = null;
        let friendsList = [];
        let currentMessages = [];

        // DOM элементы
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const friendsPanel = document.getElementById('friends-panel');
        const friendsHeader = document.getElementById('friends-header');
        const friendsListDiv = document.getElementById('friends-list');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const selectedChatName = document.getElementById('selected-chat-name');
        const currentUserNameSpan = document.getElementById('current-user-name');
        const typingIndicator = document.getElementById('typing-indicator');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const removeFriendBtn = document.getElementById('remove-friend-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');

        // Управление панелью
        function openFriendsPanel() {
            friendsPanel.classList.add('open');
            mobileOverlay.classList.add('show');
        }

        function closeFriendsPanel() {
            friendsPanel.classList.remove('open');
            mobileOverlay.classList.remove('show');
        }

        friendsHeader.onclick = () => {
            if (window.innerWidth <= 600) {
                if (friendsPanel.classList.contains('open')) {
                    closeFriendsPanel();
                } else {
                    openFriendsPanel();
                }
            }
        };

        backBtn.onclick = () => {
            if (window.innerWidth <= 600) {
                openFriendsPanel();
            }
        };

        mobileOverlay.onclick = closeFriendsPanel;

        // Вход
        document.getElementById('join-btn').onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username) {
                alert('Enter your name');
                return;
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            if (res.ok) {
                currentUser = { id: data.user_id, username };
                currentUserNameSpan.innerText = username;
                socket.emit('register', { user_id: currentUser.id, username });
                loginScreen.style.display = 'none';
                appContainer.style.display = 'flex';
                loadFriends();
            }
        };

        function loadFriends() {
            socket.emit('get_friends');
        }

        function selectChat(friend) {
            currentChatUser = friend;
            selectedChatName.innerText = friend.username;
            removeFriendBtn.style.display = 'block';
            messageInput.disabled = false;
            socket.emit('get_messages', {
                user_id: currentUser.id,
                other_user_id: friend.id
            });
            if (window.innerWidth <= 600) closeFriendsPanel();
        }

        function renderFriends() {
            if (friendsList.length === 0) {
                friendsListDiv.innerHTML = '<div class="empty-state">No friends yet. Search and add!</div>';
                return;
            }
            friendsListDiv.innerHTML = friendsList.map(f => `
                <div class="friend-item ${currentChatUser?.id === f.id ? 'active' : ''}" onclick="selectFriendAndClose('${f.id}')">
                    <div>
                        <div class="friend-name">${escapeHtml(f.username)}</div>
                        <div class="online-status">
                            <span class="online-dot ${f.online ? 'online' : 'offline'}"></span>
                            ${f.online ? 'Online' : 'Offline'}
                        </div>
                    </div>
                    <button class="remove-friend-small" onclick="event.stopPropagation(); removeFriend('${f.id}')">✕</button>
                </div>
            `).join('');
        }

        window.selectFriendAndClose = function(friendId) {
            const f = friendsList.find(x => x.id === friendId);
            if (f) selectChat(f);
        };

        window.removeFriend = async (friendId) => {
            if (confirm('Remove this friend?')) {
                await fetch('/api/remove_friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })
                });
                if (currentChatUser?.id === friendId) {
                    currentChatUser = null;
                    selectedChatName.innerText = 'Select a chat';
                    removeFriendBtn.style.display = 'none';
                    messageInput.disabled = true;
                    messagesArea.innerHTML = '<div class="empty-state">Choose a friend to start messaging</div>';
                }
                loadFriends();
            }
        };

        removeFriendBtn.onclick = () => {
            if (currentChatUser) removeFriend(currentChatUser.id);
        };

        function renderMessages() {
            if (!currentMessages.length) {
                messagesArea.innerHTML = '<div class="empty-state">No messages yet. Say hello!</div>';
                return;
            }
            messagesArea.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.from_id === currentUser?.id ? 'own' : 'other'}">
                    ${msg.from_id !== currentUser?.id ? `<div class="name">${escapeHtml(msg.from)}</div>` : ''}
                    ${escapeHtml(msg.content)}
                </div>
            `).join('');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function sendMessage() {
            if (!currentChatUser || !messageInput.value.trim()) return;
            socket.emit('private_message', {
                from_user_id: currentUser.id,
                to_user_id: currentChatUser.id,
                message: { type: 'text', content: messageInput.value.trim() }
            });
            messageInput.value = '';
        }

        // === ПОИСК ===
        let searchTimeout;
        searchInput.addEventListener('input', async (e) => {
            const query = searchInput.value.trim();
            
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }
            
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search_users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, user_id: currentUser?.id })
                    });
                    
                    const users = await res.json();
                    
                    if (users && users.length > 0) {
                        searchResults.style.display = 'block';
                        searchResults.innerHTML = users.map(u => `
                            <div class="search-result-item">
                                <div>
                                    <strong>${escapeHtml(u.username)}</strong>
                                    <div style="font-size:0.7rem">${u.online ? '🟢 Online' : '⚫ Offline'}</div>
                                </div>
                                ${!u.is_friend ? 
                                    `<button class="add-friend-btn" onclick="addFriend('${u.id}')">Add</button>` : 
                                    '<span style="font-size:0.7rem;color:#666">✓ Friend</span>'}
                            </div>
                        `).join('');
                    } else {
                        searchResults.style.display = 'block';
                        searchResults.innerHTML = '<div class="search-result-item">No users found</div>';
                    }
                } catch (err) {
                    console.error('Search error:', err);
                }
            }, 500);
        });

        window.addFriend = async (friendId) => {
            try {
                const res = await fetch('/api/add_friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })
                });
                
                if (res.ok) {
                    searchInput.value = '';
                    searchResults.style.display = 'none';
                    loadFriends();
                    alert('Friend added!');
                }
            } catch (err) {
                console.error('Add friend error:', err);
            }
        };

        // Socket события
        socket.on('friends_list', (friends) => {
            friendsList = friends || [];
            renderFriends();
        });

        socket.on('messages_history', (messages) => {
            currentMessages = messages || [];
            renderMessages();
        });

        socket.on('new_private_message', (data) => {
            if (currentChatUser && currentChatUser.id === data.from_user_id) {
                currentMessages.push(data.message);
                renderMessages();
            }
            loadFriends();
        });

        socket.on('friend_added', () => loadFriends());

        function escapeHtml(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        // ОТПРАВКА СООБЩЕНИЯ
        sendBtn.onclick = sendMessage;
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Временная заглушка для кнопки прикрепления файлов
        document.getElementById('attach-btn').onclick = () => {
            alert('File upload will be available soon!');
        };
    </script>
</body>
</html>
