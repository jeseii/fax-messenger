    <script>
        const socket = io();

        let currentUser = null;
        let currentChatUser = null;
        let friendsList = [];
        let currentMessages = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let recordingInterval = null;
        let currentStream = null;
        let contextMenu = null;
        let reactionMenu = null;
        let currentMode = 'voice';
        let isRecordingLocked = false;
        let videoRecorder = null;
        let isSending = false;
        let isTextSending = false;
        let recordedBlob = null;
        let isPaused = false;
        let pendingSend = false; // Флаг: ждём завершения записи для отправки

        // DOM элементы
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const friendsPanel = document.getElementById('friends-panel');
        const friendsHeader = document.getElementById('friends-header');
        const friendsListDiv = document.getElementById('friends-list');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const actionBtn = document.getElementById('action-btn');
        const selectedChatName = document.getElementById('selected-chat-name');
        const currentUserNameSpan = document.getElementById('current-user-name');
        const typingIndicator = document.getElementById('typing-indicator');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const removeFriendBtn = document.getElementById('remove-friend-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        
        const voiceRecordingPanel = document.getElementById('voice-recording-panel');
        const voiceRecordingTimeSpan = document.getElementById('voice-recording-time');
        const stopVoiceBtn = document.getElementById('stop-voice-recording');
        const lockedPanel = document.getElementById('locked-panel');
        const sendLockedBtn = document.getElementById('send-locked');
        const cancelLockedBtn = document.getElementById('cancel-locked');
        const videoPreview = document.getElementById('video-preview');
        const previewVideo = document.getElementById('preview-video');

        function saveUserToStorage(user) {
            if (!user) return;
            localStorage.setItem('fax_user', JSON.stringify({
                id: user.id,
                username: user.username,
                savedAt: Date.now()
            }));
        }

        function loadUserFromStorage() {
            try {
                const data = localStorage.getItem('fax_user');
                if (data) {
                    const user = JSON.parse(data);
                    if (Date.now() - user.savedAt < 30 * 24 * 60 * 60 * 1000) {
                        return user;
                    }
                    localStorage.removeItem('fax_user');
                }
            } catch(e) {}
            return null;
        }

        async function tryAutoLogin() {
            const savedUser = loadUserFromStorage();
            if (!savedUser) return false;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: savedUser.username })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = { id: data.user_id, username: savedUser.username };
                    currentUserNameSpan.innerText = savedUser.username;
                    saveUserToStorage(currentUser);
                    socket.emit('register', { user_id: currentUser.id, username: currentUser.username });
                    loginScreen.style.display = 'none';
                    appContainer.style.display = 'flex';
                    loadFriends();
                    return true;
                }
            } catch(e) { console.error('Auto login failed:', e); }
            return false;
        }

        function openFriendsPanel() {
            friendsPanel.classList.add('open');
            mobileOverlay.classList.add('show');
        }

        function closeFriendsPanel() {
            friendsPanel.classList.remove('open');
            mobileOverlay.classList.remove('show');
        }

        friendsHeader.onclick = () => {
            if (window.innerWidth <= 600) {
                friendsPanel.classList.contains('open') ? closeFriendsPanel() : openFriendsPanel();
            }
        };

        backBtn.onclick = () => { if (window.innerWidth <= 600) openFriendsPanel(); };
        mobileOverlay.onclick = closeFriendsPanel;

        function updateActionButton() {
            const hasText = messageInput.value.trim().length > 0;
            if (hasText && currentChatUser) {
                actionBtn.innerHTML = '➤';
                actionBtn.title = 'Send message';
            } else if (currentChatUser) {
                actionBtn.innerHTML = currentMode === 'voice' ? '🎤' : '🎥';
                actionBtn.title = currentMode === 'voice' 
                    ? 'Voice (tap to switch, hold to record)' 
                    : 'Video (tap to switch, hold to record)';
            } else {
                actionBtn.innerHTML = '🎤';
            }
        }

        function switchMode() {
            currentMode = currentMode === 'voice' ? 'video' : 'voice';
            updateActionButton();
        }

        // === ИСПРАВЛЕННАЯ ЗАПИСЬ ГОЛОСА ===
        async function startVoiceRecording() {
            if (!currentChatUser || isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentStream = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                recordedBlob = null;
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
                
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                
                // === КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: отправка ВНУТРИ onstop ===
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        // Авто-отправка после завершения записи
                        if (!isRecordingLocked && !isSending && currentChatUser) {
                            isSending = true;
                            const file = new File([recordedBlob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
                            await uploadAndSend(file, 'voice');
                            isSending = false;
                            recordedBlob = null;
                        }
                        // Если нажата кнопка ➤ после записи
                        if (pendingSend && recordedBlob && !isSending) {
                            pendingSend = false;
                            isSending = true;
                            const file = new File([recordedBlob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
                            await uploadAndSend(file, 'voice');
                            isSending = false;
                            recordedBlob = null;
                        }
                    }
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                showVoiceRecordingPanel();
                startRecordingTimer();
            } catch (err) {
                console.error('Microphone error:', err);
                alert('Please allow microphone access');
            }
        }

        function pauseVoiceRecording() {
            if (mediaRecorder?.state === 'recording') {
                mediaRecorder.pause();
                isPaused = true;
                stopVoiceBtn.innerHTML = '▶️';
            }
        }

        function resumeVoiceRecording() {
            if (mediaRecorder?.state === 'paused') {
                mediaRecorder.resume();
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
            }
        }

        function stopVoiceRecording() {
            if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
                mediaRecorder.stop();
            }
            hideVoiceRecordingPanel();
            isRecording = false;
        }

        // === ИСПРАВЛЕННАЯ ЗАПИСЬ ВИДЕО ===
        async function startVideoRecording() {
            if (!currentChatUser || isRecording) return;
            try {
                videoPreview.classList.add('show');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                currentStream = stream;
                previewVideo.srcObject = stream;
                
                videoRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                let chunks = [];
                recordedBlob = null;
                
                videoRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                
                // === КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: отправка ВНУТРИ onstop ===
                videoRecorder.onstop = async () => {
                    if (chunks.length > 0) {
                        recordedBlob = new Blob(chunks, { type: 'video/webm' });
                        // Авто-отправка после завершения записи
                        if (!isRecordingLocked && !isSending && currentChatUser) {
                            isSending = true;
                            const file = new File([recordedBlob], `video_${Date.now()}.webm`, { type: 'video/webm' });
                            await uploadAndSend(file, 'video');
                            isSending = false;
                            recordedBlob = null;
                        }
                        // Если нажата кнопка ➤ после записи
                        if (pendingSend && recordedBlob && !isSending) {
                            pendingSend = false;
                            isSending = true;
                            const file = new File([recordedBlob], `video_${Date.now()}.webm`, { type: 'video/webm' });
                            await uploadAndSend(file, 'video');
                            isSending = false;
                            recordedBlob = null;
                        }
                    }
                    if (currentStream && !isRecordingLocked) {
                        currentStream.getTracks().forEach(t => t.stop());
                        currentStream = null;
                    }
                    previewVideo.srcObject = null;
                    if (!isRecordingLocked) videoPreview.classList.remove('show');
                };
                
                videoRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                startRecordingTimer();
            } catch (err) {
                console.error('Camera error:', err);
                alert('Please allow camera access');
                videoPreview.classList.remove('show');
            }
        }

        function stopVideoRecording() {
            if (videoRecorder?.state === 'recording') videoRecorder.stop();
            if (currentStream && !isRecordingLocked) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            isRecording = false;
        }

        function showVoiceRecordingPanel() { voiceRecordingPanel.classList.add('show'); }
        function hideVoiceRecordingPanel() {
            voiceRecordingPanel.classList.remove('show');
            if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
        }
        function showLockedPanel() { lockedPanel.classList.add('show'); }
        function hideLockedPanel() { lockedPanel.classList.remove('show'); }

        function startRecordingTimer() {
            recordingInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                voiceRecordingTimeSpan.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function lockRecording() {
            if (!isRecording) return;
            isRecordingLocked = true;
            showLockedPanel();
            actionBtn.classList.remove('recording');
        }

        function cancelLockedRecording() {
            recordedBlob = null;
            hideLockedPanel();
            if (currentMode === 'voice') hideVoiceRecordingPanel();
            else videoPreview.classList.remove('show');
            isRecordingLocked = false;
            actionBtn.classList.remove('locked');
            isRecording = false;
            if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        }

        function sendLockedRecording() {
            if (recordedBlob && !isSending && currentChatUser) {
                isSending = true;
                const file = new File([recordedBlob], currentMode === 'voice' ? `voice_${Date.now()}.webm` : `video_${Date.now()}.webm`, 
                    { type: currentMode === 'voice' ? 'audio/webm' : 'video/webm' });
                uploadAndSend(file, currentMode === 'voice' ? 'voice' : 'video').finally(() => { isSending = false; });
                hideLockedPanel();
                if (currentMode === 'voice') hideVoiceRecordingPanel();
                else videoPreview.classList.remove('show');
                isRecordingLocked = false;
                actionBtn.classList.remove('locked');
                recordedBlob = null;
                isRecording = false;
                if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
            }
        }

        sendLockedBtn.onclick = sendLockedRecording;
        cancelLockedBtn.onclick = cancelLockedRecording;
        stopVoiceBtn.onclick = () => { isPaused ? resumeVoiceRecording() : pauseVoiceRecording(); };

        let pressTimer = null;
        let isLongPress = false;
        let touchStartY = 0;

        function onActionButtonStart(e) {
            if (!currentChatUser) return;
            if (messageInput.value.trim().length > 0) return;
            e.preventDefault();
            isLongPress = false;
            if (e.touches) touchStartY = e.touches[0].clientY;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                currentMode === 'voice' ? startVoiceRecording() : startVideoRecording();
            }, 300);
        }

        function onActionButtonMove(e) {
            if (!isRecording || !e.touches) return;
            const deltaY = touchStartY - e.touches[0].clientY;
            if (deltaY > 50 && !isRecordingLocked) lockRecording();
        }

        function onActionButtonEnd(e) {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (!currentChatUser) return;
            
            const hasText = messageInput.value.trim().length > 0;
            
            // === ИСПРАВЛЕНИЕ 1: Отправка текста ===
            if (hasText) {
                sendMessage();
                return;
            }
            
            // === ИСПРАВЛЕНИЕ 2: Авто-отправка при отпускании после записи ===
            if (isLongPress && isRecording && !isRecordingLocked) {
                // Просто останавливаем запись - отправка произойдёт в onstop
                if (currentMode === 'voice') stopVoiceRecording();
                else { stopVideoRecording(); videoPreview.classList.remove('show'); }
                hideVoiceRecordingPanel();
                isRecording = false;
                return;
            }
            
            // Короткое нажатие = смена режима
            if (!isLongPress) switchMode();
            isLongPress = false;
        }

        function onActionButtonCancel() {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (isRecording && !isRecordingLocked) {
                if (currentMode === 'voice') stopVoiceRecording();
                else { stopVideoRecording(); videoPreview.classList.remove('show'); }
                hideVoiceRecordingPanel();
            }
            isLongPress = false;
            isRecording = false;
        }

        actionBtn.addEventListener('mousedown', onActionButtonStart);
        actionBtn.addEventListener('mouseup', onActionButtonEnd);
        actionBtn.addEventListener('touchstart', onActionButtonStart);
        actionBtn.addEventListener('touchmove', onActionButtonMove);
        actionBtn.addEventListener('touchend', onActionButtonEnd);
        actionBtn.addEventListener('touchcancel', onActionButtonCancel);
        
        window.addEventListener('mouseup', function(e) {
            if (e.target !== actionBtn && isRecording && !isRecordingLocked) {
                if (currentMode === 'voice') stopVoiceRecording();
                else { stopVideoRecording(); videoPreview.classList.remove('show'); }
                hideVoiceRecordingPanel();
                isRecording = false;
            }
        });

        // === ИСПРАВЛЕНИЕ 3: Кнопка ➤ отправляет медиа после записи ===
        actionBtn.onclick = (e) => {
            // Если есть текст — отправляем
            if (messageInput.value.trim().length > 0 && currentChatUser) {
                sendMessage();
                return;
            }
            // Если есть готовая запись (blob) — отправляем её
            if (recordedBlob && !isSending && currentChatUser) {
                e.preventDefault();
                e.stopPropagation();
                pendingSend = false; // Сбрасываем, т.к. уже обрабатываем
                isSending = true;
                const file = new File([recordedBlob], currentMode === 'voice' ? `voice_${Date.now()}.webm` : `video_${Date.now()}.webm`, 
                    { type: currentMode === 'voice' ? 'audio/webm' : 'video/webm' });
                uploadAndSend(file, currentMode === 'voice' ? 'voice' : 'video').finally(() => {
                    isSending = false;
                    recordedBlob = null;
                    updateActionButton();
                });
                return;
            }
            // Иначе — переключаем режим (только если не было longpress)
            if (!isLongPress && !isRecording) switchMode();
        };

        document.getElementById('join-btn').onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username) { alert('Enter your name'); return; }
            const res = await fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            if (res.ok) {
                currentUser = { id: data.user_id, username };
                currentUserNameSpan.innerText = username;
                saveUserToStorage(currentUser);
                socket.emit('register', { user_id: currentUser.id, username });
                loginScreen.style.display = 'none';
                appContainer.style.display = 'flex';
                loadFriends();
            }
        };

        function loadFriends() { socket.emit('get_friends'); }

        function selectChat(friend) {
            currentChatUser = friend;
            selectedChatName.innerText = friend.username;
            removeFriendBtn.style.display = 'block';
            updateActionButton();
            socket.emit('mark_as_read', { user_id: currentUser.id, other_user_id: friend.id });
            socket.emit('get_messages', { user_id: currentUser.id, other_user_id: friend.id });
            if (window.innerWidth <= 600) closeFriendsPanel();
        }

        function renderFriends() {
            if (friendsList.length === 0) {
                friendsListDiv.innerHTML = '<div class="empty-state">No friends yet. Search and add!</div>';
                return;
            }
            friendsListDiv.innerHTML = friendsList.map(f => `
                <div class="friend-item ${currentChatUser?.id === f.id ? 'active' : ''}" onclick="selectFriendAndClose('${f.id}')">
                    <div>
                        <div class="friend-name">${escapeHtml(f.username)}</div>
                        <div class="online-status">
                            <span class="online-dot ${f.online ? 'online' : 'offline'}"></span>
                            ${f.online ? 'Online' : 'Offline'}
                        </div>
                    </div>
                    ${f.unread > 0 ? `<div class="unread-badge">${f.unread}</div>` : ''}
                    <button class="remove-friend-small" onclick="event.stopPropagation(); removeFriend('${f.id}')">✕</button>
                </div>
            `).join('');
        }

        window.selectFriendAndClose = function(friendId) {
            const f = friendsList.find(x => x.id === friendId);
            if (f) selectChat(f);
        };

        window.removeFriend = async (friendId) => {
            if (confirm('Remove this friend?')) {
                await fetch('/api/remove_friend', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })
                });
                if (currentChatUser?.id === friendId) {
                    currentChatUser = null;
                    selectedChatName.innerText = 'Select a chat';
                    removeFriendBtn.style.display = 'none';
                    messageInput.disabled = true;
                    messagesArea.innerHTML = '<div class="empty-state">Choose a friend to start messaging</div>';
                }
                loadFriends();
            }
        };

        removeFriendBtn.onclick = () => { if (currentChatUser) removeFriend(currentChatUser.id); };

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function getStatusIcon(status) {
            if (status === 'sent') return '✓';
            if (status === 'delivered' || status === 'read') return '✓✓';
            return '';
        }

        function zoomVideo(videoElement) {
            if (videoElement.classList.contains('zoomed')) {
                videoElement.classList.remove('zoomed');
                videoElement.controls = false;
                videoElement.pause();
            } else {
                document.querySelectorAll('.message video').forEach(v => v.classList.remove('zoomed'));
                videoElement.classList.add('zoomed');
                videoElement.controls = true;
                videoElement.play();
                videoElement.addEventListener('ended', () => {
                    videoElement.classList.remove('zoomed');
                    videoElement.controls = false;
                }, { once: true });
            }
        }

        function renderMessages() {
            if (!currentMessages.length) {
                messagesArea.innerHTML = '<div class="empty-state">No messages yet. Say hello!</div>';
                return;
            }
            messagesArea.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.from_id === currentUser?.id ? 'own' : 'other'}" data-message-id="${msg.id}" data-message-type="${msg.type}" data-message-from="${msg.from_id}">
                    ${msg.from_id !== currentUser?.id ? `<div class="name">${escapeHtml(msg.from)}</div>` : ''}
                    <div>${renderMessageContent(msg)}</div>
                    ${msg.edited ? `<span class="edited-badge">edited</span>` : ''}
                    <div class="reactions">${renderReactions(msg)}</div>
                    <span class="action-area">⚙️</span>
                    <div class="time">
                        ${formatTime(msg.timestamp)}
                        ${msg.from_id === currentUser?.id ? `<span class="status">${getStatusIcon(msg.status)}</span>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.message').forEach(msgEl => {
                const messageId = msgEl.dataset.messageId;
                const messageType = msgEl.dataset.messageType;
                const messageFrom = msgEl.dataset.messageFrom;
                const actionArea = msgEl.querySelector('.action-area');
                actionArea?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rect = msgEl.getBoundingClientRect();
                    if (messageFrom === currentUser?.id) showContextMenu(rect.left - 10, rect.top, messageId, messageType);
                    else showReactionMenu(rect.right + 10, rect.top, messageId);
                });
                const video = msgEl.querySelector('video');
                if (video) video.addEventListener('click', (e) => { e.stopPropagation(); zoomVideo(video); });
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderReactions(msg) {
            if (!msg.reactions) return '';
            const reactions = {};
            for (const [userId, reaction] of Object.entries(msg.reactions)) {
                reactions[reaction] = (reactions[reaction] || 0) + 1;
            }
            return Object.entries(reactions).map(([reaction, count]) => 
                `<span class="reaction" data-reaction="${reaction}">${reaction} ${count}</span>`
            ).join('');
        }

        function renderMessageContent(msg) {
            if (msg.type === 'text') return escapeHtml(msg.content);
            if (msg.type === 'image') return `<img src="${msg.content}" alt="Image" onclick="window.open('${msg.content}', '_blank')">`;
            if (msg.type === 'video') return `<video src="${msg.content}" playsinline></video>`;
            if (msg.type === 'voice') return `<audio src="${msg.content}" controls></audio>`;
            if (msg.type === 'file') return `<a href="${msg.content}" target="_blank">📎 ${msg.filename || 'File'}</a>`;
            return msg.content;
        }

        function showContextMenu(x, y, messageId, messageType) {
            if (contextMenu) contextMenu.remove();
            contextMenu = document.createElement('div');
            contextMenu.className = 'context-menu';
            contextMenu.style.left = (x - 150) + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.innerHTML = messageType === 'text' 
                ? `<div class="context-menu-item" data-action="edit">✏️ Edit</div><div class="context-menu-item" data-action="delete">🗑️ Delete</div>`
                : `<div class="context-menu-item" data-action="delete">🗑️ Delete</div>`;
            if (messageType === 'text') {
                contextMenu.querySelector('[data-action="edit"]').onclick = () => { editMessage(messageId); contextMenu.remove(); };
            }
            contextMenu.querySelector('[data-action="delete"]').onclick = () => { deleteMessage(messageId); contextMenu.remove(); };
            document.body.appendChild(contextMenu);
            setTimeout(() => { document.addEventListener('click', () => contextMenu.remove(), { once: true }); }, 10);
        }

        function showReactionMenu(x, y, messageId) {
            if (reactionMenu) reactionMenu.remove();
            reactionMenu = document.createElement('div');
            reactionMenu.className = 'reaction-menu';
            reactionMenu.style.left = x + 'px';
            reactionMenu.style.top = y + 'px';
            reactionMenu.innerHTML = `
                <span class="reaction-emoji" data-reaction="❤️">❤️</span>
                <span class="reaction-emoji" data-reaction="👍">👍</span>
                <span class="reaction-emoji" data-reaction="😂">😂</span>
                <span class="reaction-emoji" data-reaction="😮">😮</span>
                <span class="reaction-emoji" data-reaction="😢">😢</span>
                <span class="reaction-emoji" data-reaction="😡">😡</span>
            `;
            document.body.appendChild(reactionMenu);
            reactionMenu.querySelectorAll('.reaction-emoji').forEach(emoji => {
                emoji.onclick = () => { addReaction(messageId, emoji.dataset.reaction); reactionMenu.remove(); };
            });
            setTimeout(() => { document.addEventListener('click', () => reactionMenu.remove(), { once: true }); }, 10);
        }

        function editMessage(messageId) {
            const messageEl = document.querySelector(`.message[data-message-id="${messageId}"]`);
            const oldText = messageEl.querySelector('div').innerText;
            const newText = prompt('Edit message:', oldText);
            if (newText && newText !== oldText) {
                socket.emit('edit_message', { message_id: messageId, new_content: newText, user_id: currentUser.id, chat_with: currentChatUser.id });
            }
        }

        function deleteMessage(messageId) {
            if (confirm('Delete this message?')) {
                socket.emit('delete_message', { message_id: messageId, user_id: currentUser.id, chat_with: currentChatUser.id });
                const msgIndex = currentMessages.findIndex(m => m.id === messageId);
                if (msgIndex !== -1) { currentMessages.splice(msgIndex, 1); renderMessages(); }
            }
        }

        function addReaction(messageId, reaction) {
            socket.emit('add_reaction', { message_id: messageId, reaction, user_id: currentUser.id, chat_with: currentChatUser.id });
        }

        function sendMessage() {
            if (!currentChatUser) { alert('Select a friend first'); return; }
            const text = messageInput.value.trim();
            if (!text || isTextSending) return;
            isTextSending = true;
            socket.emit('private_message', { from_user_id: currentUser.id, to_user_id: currentChatUser.id, message: { type: 'text', content: text } });
            messageInput.value = '';
            updateActionButton();
            setTimeout(() => { isTextSending = false; }, 500);
        }

        async function uploadAndSend(file, type) {
            if (!currentChatUser) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (res.ok) {
                socket.emit('private_message', {
                    from_user_id: currentUser.id,
                    to_user_id: currentChatUser.id,
                    message: { type, content: data.url, name: data.name }
                });
            }
        }

        let searchTimeout;
        searchInput.addEventListener('input', async () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();
            if (query.length < 2) { searchResults.style.display = 'none'; return; }
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search_users', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, user_id: currentUser?.id })
                    });
                    const users = await res.json();
                    searchResults.style.display = 'block';
                    searchResults.innerHTML = (users?.length > 0 ? users : [])
                        .map(u => `<div class="search-result-item"><div><strong>${escapeHtml(u.username)}</strong><div style="font-size:0.7rem">${u.online ? '🟢 Online' : '⚫ Offline'}</div></div>${!u.is_friend ? `<button class="add-friend-btn" onclick="addFriend('${u.id}')">Add</button>` : '<span style="font-size:0.7rem;color:#666">✓</span>'}</div>`).join('')
                        || '<div class="search-result-item">No users found</div>';
                } catch (err) { console.error('Search error:', err); }
            }, 500);
        });

        window.addFriend = async (friendId) => {
            try {
                const res = await fetch('/api/add_friend', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })
                });
                if (res.ok) { searchInput.value = ''; searchResults.style.display = 'none'; loadFriends(); }
            } catch (err) { console.error('Add friend error:', err); }
        };

        document.getElementById('attach-file').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                if (e.target.files[0]) {
                    const file = e.target.files[0];
                    if (file.type.startsWith('image/')) uploadAndSend(file, 'image');
                    else if (file.type.startsWith('video/')) uploadAndSend(file, 'video');
                    else uploadAndSend(file, 'file');
                }
            };
            input.click();
        };

        socket.on('friends_list', (friends) => { friendsList = friends || []; renderFriends(); });
        socket.on('messages_history', (messages) => { currentMessages = messages || []; renderMessages(); });
        socket.on('new_private_message', (data) => {
            if (!currentMessages.some(m => m.id === data.message.id)) {
                currentMessages.push(data.message);
                if (currentChatUser?.id === data.from_user_id) renderMessages();
            }
            loadFriends();
        });
        socket.on('friend_added', () => loadFriends());
        socket.on('user_typing_private', (data) => {
            if (currentChatUser?.id === data.from_user_id) {
                typingIndicator.style.display = data.is_typing ? 'block' : 'none';
                typingIndicator.innerText = data.is_typing ? `${data.from_username} is typing...` : '';
            }
        });
        socket.on('message_edited', (data) => {
            const idx = currentMessages.findIndex(m => m.id === data.message_id);
            if (idx !== -1) { currentMessages[idx].content = data.new_content; currentMessages[idx].edited = true; renderMessages(); }
        });
        socket.on('message_deleted', (data) => {
            const idx = currentMessages.findIndex(m => m.id === data.message_id);
            if (idx !== -1) { currentMessages.splice(idx, 1); renderMessages(); }
        });
        socket.on('reaction_added', (data) => {
            const idx = currentMessages.findIndex(m => m.id === data.message_id);
            if (idx !== -1) {
                if (!currentMessages[idx].reactions) currentMessages[idx].reactions = {};
                currentMessages[idx].reactions[data.by] = data.reaction;
                renderMessages();
            }
            loadFriends();
        });
        socket.on('unread_count', (data) => {
            const f = friendsList.find(x => x.id === data.from);
            if (f) { f.unread = data.count; renderFriends(); }
        });
        socket.on('messages_read', (data) => {
            if (currentChatUser?.id === data.by) {
                for (const msg of currentMessages) {
                    if (msg.from_id === currentUser.id && msg.status !== 'read') msg.status = 'read';
                }
                renderMessages();
            }
        });

        messageInput.addEventListener('input', updateActionButton);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });

        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        tryAutoLogin();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/service-worker.js').catch(console.error);
    </script>
