<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAX Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0e161b;
            --panel: #17212b;
            --input: #242f3d;
            --primary: #8774e1;
            --text: #f5f5f5;
            --msg-sent: #2b5278;
            --msg-recv: #182533;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }
        
        /* Layout */
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0e161b; position: relative; }
        
        /* Login Screen */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--panel); padding: 2rem; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: var(--input); border: none; color: white; border-radius: 8px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        
        /* Chat Header */
        .chat-header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; }
        
        /* Messages */
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Message Row & Reaction Area */
        .msg-row { display: flex; width: 100%; position: relative; }
        .msg-row.own { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }
        
        /* Зона для реакции (пустое место) */
        .reaction-zone {
            width: 30px; 
            min-height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            z-index: 5;
        }
        .reaction-zone:active { background: rgba(255,255,255,0.05); }

        /* Bubble */
        .message {
            max-width: 65%; padding: 8px 12px; border-radius: 12px; position: relative; font-size: 15px; line-height: 1.4;
        }
        .message.own { background: var(--msg-sent); border-bottom-right-radius: 4px; }
        .message.other { background: var(--msg-recv); border-bottom-left-radius: 4px; }

        .msg-meta { font-size: 11px; color: #8899a6; text-align: right; margin-top: 2px; display: flex; justify-content: flex-end; gap: 4px; align-items: center; }
        .ticks { color: #8774e1; font-weight: bold; }
        .ticks.read { color: #4fc3f7; }

        /* Media Styles */
        .message img, .message video { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }
        
        /* Убираем рамку у аудио и видео */
        .message audio, .message video { border: none !important; outline: none !important; box-shadow: none !important; }
        /* Видео-кружок */
        .video-circle { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; cursor: pointer; border: none; }
        .audio-msg { min-width: 200px; }

        /* Input Area */
        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; background: var(--input); border: none; padding: 12px; color: white; border-radius: 20px; outline: none; }
        
        /* Toggle Button */
        .media-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--input); border: none; color: var(--primary); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .media-btn:active { transform: scale(0.9); }
        
        /* Emoji Modal */
        #emoji-modal { display: none; position: absolute; background: var(--panel); border-radius: 8px; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; }
        .emoji-item { font-size: 1.5rem; padding: 5px; cursor: pointer; display: inline-block; }

        /* Fullscreen Video Modal */
        #video-fs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        #video-fs-modal video { max-width: 90%; max-height: 90%; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h2>FAX Messenger</h2>
            <input type="text" id="username-inp" placeholder="Введите имя">
            <button class="btn" onclick="login()">Войти</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div style="padding: 15px; font-weight: bold; font-size: 1.2rem;">Чаты</div>
        <div id="friends-list" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <!-- Main Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <span id="chat-title">Выберите чат</span>
        </div>

        <div class="messages-container" id="messages"></div>

        <!-- Emoji Modal (Absolute) -->
        <div id="emoji-modal"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <!-- Кнопка переключения/записи -->
            <button id="record-btn" class="media-btn" title="Зажми для записи, кликни для смены режима">🎤</button>
        </div>
    </div>

    <!-- Fullscreen Video -->
    <div id="video-fs-modal" onclick="closeVideoFs()">
        <video id="fs-video" controls autoplay></video>
    </div>

    <script>
        const socket = io();
        let user = null;
        let currentChatId = null;
        let isVideoMode = false; // По умолчанию голосовые

        // DOM
        const loginScreen = document.getElementById('login-screen');
        const usernameInp = document.getElementById('username-inp');
        const friendsList = document.getElementById('friends-list');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const recordBtn = document.getElementById('record-btn');
        const chatTitle = document.getElementById('chat-title');
        const emojiModal = document.getElementById('emoji-modal');
        const fsModal = document.getElementById('video-fs-modal');
        const fsVideo = document.getElementById('fs-video');

        // --- AUTH ---
        function login() {
            const name = usernameInp.value.trim();
            if(!name) return;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: name})
            }).then(r => r.json()).then(data => {
                user = data;
                loginScreen.style.display = 'none';
                socket.emit('register', {user_id: user.user_id, username: user.username});
            });
        }

        // --- LIST LOGIC ---
        socket.on('friends_list', (friends) => {
            friendsList.innerHTML = '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.style.cssText = "padding: 15px; cursor: pointer; border-bottom: 1px solid #000;";
                div.innerHTML = `<b>${f.username}</b> ${f.unread ? `<span style="background:red; border-radius:50%; padding:2px 6px; font-size:10px;">${f.unread}</span>` : ''}`;
                div.onclick = () => openChat(f);
                friendsList.appendChild(div);
            });
        });

        function openChat(friend) {
            currentChatId = friend.id;
            chatTitle.innerText = friend.username;
            socket.emit('get_messages', {user_id: user.user_id, other_user_id: friend.id});
        }

        // --- MESSAGES ---
        socket.on('messages_history', (msgs) => {
            messagesDiv.innerHTML = '';
            msgs.forEach(addMessageToUI);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        socket.on('new_private_message', (data) => {
            const msg = data.message;
            const fromId = data.from_user_id; // ID отправителя
            // Если сообщение наше, обновляем UI, если чужое - добавляем
            // Простая проверка: если ID сообщения уже есть, не дублируем
            if(document.getElementById(msg.id)) return;
            
            // Важно: при новом сообщении от сервера нужно обновить галочки
            // Если это наше сообщение, и сервер вернул read: true
            addMessageToUI(msg);
        });

        socket.on('messages_read', (data) => {
            // data.by - кто прочитал. Если это мы (currentChat), значит прочитано
            if(data.chat_with === user.user_id) {
                renderMessages(); // Перерисовываем, чтобы обновить галочки
            }
        });
        
        // Специальное событие для удаления без перезагрузки
        socket.on('message_deleted_client', (data) => {
            const el = document.getElementById(data.message_id);
            if(el) el.remove();
        });

        function addMessageToUI(msg) {
            // Проверка на дубли
            if(document.getElementById(msg.id)) return;

            const isOwn = msg.from_id === user.user_id;
            const row = document.createElement('div');
            row.className = `msg-row ${isOwn ? 'own' : 'other'}`;
            row.id = msg.id;

            // Реакция зона (пустое место)
            const reactZone = document.createElement('div');
            reactZone.className = 'reaction-zone';
            reactZone.innerHTML = `<span id="react-${msg.id}" style="opacity:0.3; font-size:12px;">👍</span>`; // Заглушка
            reactZone.oncontextmenu = (e) => { e.preventDefault(); showEmojiMenu(e, msg.id); };
            // Для мобильных
            let pressTimer;
            reactZone.ontouchstart = (e) => { pressTimer = setTimeout(() => showEmojiMenu(e.touches[0], msg.id), 500); };
            reactZone.ontouchend = () => clearTimeout(pressTimer);

            // Bubble
            const bubble = document.createElement('div');
            bubble.className = `message ${isOwn ? 'own' : 'other'}`;

            let content = '';
            if(msg.type === 'text') content = msg.content;
            else if(msg.type === 'image') content = `<img src="${msg.content}">`;
            else if(msg.type === 'voice') content = `<audio src="${msg.content}" controls class="audio-msg"></audio>`;
            else if(msg.type === 'video') content = `<video src="${msg.content}" class="video-circle" onclick="playFullscreen('${msg.content}')"></video>`;

            // Галочки
            let ticksHtml = '';
            if(isOwn) {
                if(msg.read) ticksHtml = '<span class="ticks read">✔✔</span>';
                else ticksHtml = '<span class="ticks">✔</span>'; // Одно если отправлено, но не прочитано
            }

            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            bubble.innerHTML = `${content}<div class="msg-meta">${time} ${ticksHtml}</div>`;

            row.appendChild(isOwn ? bubble : reactZone);
            row.appendChild(isOwn ? reactZone : bubble);
            messagesDiv.appendChild(row);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Перерисовка для обновления статуса прочтения
        function renderMessages() {
            if(!currentChatId) return;
            socket.emit('get_messages', {user_id: user.user_id, other_user_id: currentChatId});
        }

        // --- REACTIONS ---
        function showEmojiMenu(e, msgId) {
            const emojis = ['❤️', '👍', '🔥', '', '😢'];
            emojiModal.innerHTML = emojis.map(em => `<span class="emoji-item" onclick="react('${msgId}', '${em}')">${em}</span>`).join('');
            
            // Position
            const x = e.clientX || e.pageX;
            const y = e.clientY || e.pageY;
            emojiModal.style.left = x + 'px';
            emojiModal.style.top = y + 'px';
            emojiModal.style.display = 'block';
        }

        window.react = (msgId, emoji) => {
            // Простая визуальная реакция без сложного бэкенда
            const el = document.getElementById(`react-${msgId}`);
            if(el) { el.innerText = emoji; el.style.opacity = 1; el.style.fontSize = '18px'; }
            emojiModal.style.display = 'none';
            // Тут можно добавить socket.emit('add_reaction', ...)
        };

        document.onclick = (e) => { if(!emojiModal.contains(e.target)) emojiModal.style.display = 'none'; };

        // --- RECORDING LOGIC (Telegram Style) ---
        let mediaRecorder;
        let chunks = [];
        let isRecording = false;
        let pressTimeout;

        function updateBtnIcon() {
            recordBtn.innerHTML = isVideoMode ? '📹' : '🎤';
            recordBtn.style.color = isVideoMode ? '#e74c3c' : '#8774e1';
        }

        // Клик (смена режима)
        recordBtn.onclick = () => {
            if(!isRecording) {
                isVideoMode = !isVideoMode;
                updateBtnIcon();
            }
        };

        // Удержание (запись)
        const startRec = async (e) => {
            e.preventDefault();
            if(isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideoMode });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: isVideoMode ? 'video/webm' : 'audio/webm' });
                    const formData = new FormData();
                    formData.append('file', blob, isVideoMode ? 'video.webm' : 'audio.webm');
                    
                    const res = await fetch('/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    if(data.url) {
                        socket.emit('private_message', {
                            from_user_id: user.user_id,
                            to_user_id: currentChatId,
                            message: { type: isVideoMode ? 'video' : 'voice', content: data.url }
                        });
                    }
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.style.transform = "scale(1.2)";
            } catch(err) { alert('Ошибка доступа к микрофону/камере'); }
        };

        const stopRec = () => {
            if(isRecording && mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.style.transform = "scale(1)";
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        };

        recordBtn.onmousedown = startRec;
        recordBtn.onmouseup = stopRec;
        recordBtn.ontouchstart = startRec;
        recordBtn.ontouchend = stopRec;

        // --- SENDING TEXT ---
        msgInput.onkeypress = (e) => {
            if(e.key === 'Enter') sendText();
        };
        function sendText() {
            if(!msgInput.value.trim() || !currentChatId) return;
            socket.emit('private_message', {
                from_user_id: user.user_id,
                to_user_id: currentChatId,
                message: { type: 'text', content: msgInput.value }
            });
            msgInput.value = '';
        }

        // --- FULLSCREEN VIDEO ---
        window.playFullscreen = (src) => {
            fsVideo.src = src;
            fsModal.style.display = 'flex';
            fsVideo.play();
            // Авто-уменьшение при окончании
            fsVideo.onended = closeVideoFs;
        };

        window.closeVideoFs = () => {
            fsModal.style.display = 'none';
            fsVideo.pause();
            fsVideo.src = "";
        };

    </script>
</body>
</html>
