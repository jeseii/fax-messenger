<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>FAX Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/fax-icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FAX">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background: #0a0f0f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0a0f0f;
            color: #e0e0e0;
        }

        .glass {
            background: rgba(15, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 157, 143, 0.2);
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0f;
            z-index: 100;
        }

        .login-box {
            background: rgba(26, 31, 31, 0.8);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid rgba(42, 157, 143, 0.3);
            width: 90%;
            max-width: 350px;
        }

        .login-box h1 {
            color: #2a9d8f;
            margin-bottom: 1rem;
        }

        .login-box input {
            background: rgba(30, 42, 42, 0.8);
            border: 1px solid rgba(42, 157, 143, 0.3);
            color: white;
            padding: 0.75rem;
            border-radius: 2rem;
            width: 100%;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .login-box button {
            background: #2a9d8f;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .friends-panel {
            width: 300px;
            background: rgba(15, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(42, 157, 143, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }

        .friends-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(10, 15, 15, 0.8);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .friends-header h3 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .profile-btn {
            background: rgba(42, 157, 143, 0.5);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            margin-right: 0.5rem;
        }

        .create-group-btn {
            background: rgba(42, 157, 143, 0.5);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }

        .current-user {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.3rem;
            padding: 0 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .current-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .search-box {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(30, 42, 42, 0.3);
        }

        .search-box input {
            width: 100%;
            background: rgba(26, 31, 31, 0.8);
            border: 1px solid rgba(42, 157, 143, 0.3);
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            margin-top: 0.5rem;
        }

        .search-result-item {
            padding: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(30, 42, 42, 0.3);
        }

        .add-friend-btn {
            background: #2a9d8f;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .chat-item {
            padding: 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .chat-item:hover {
            background: rgba(30, 42, 42, 0.4);
        }

        .chat-item.active {
            background: #2a9d8f;
            color: white;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(42, 157, 143, 0.3);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 500;
        }

        .online-status {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }

        .online-dot.online {
            background: #2a9d8f;
        }

        .online-dot.offline {
            background: #666;
        }

        .unread-badge {
            background: #e74c3c;
            color: white;
            border-radius: 1rem;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .group-badge {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-left: 0.3rem;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 15, 15, 0.9);
            height: 100%;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(15, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .chat-header h4 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .call-buttons {
            display: flex;
            gap: 0.5rem;
            margin-right: 0.5rem;
        }

        .call-btn {
            background: rgba(42, 157, 143, 0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .call-btn:hover {
            background: rgba(42, 157, 143, 0.8);
            transform: scale(1.05);
        }

        .video-call-btn {
            background: rgba(231, 76, 60, 0.5);
        }

        .video-call-btn:hover {
            background: rgba(231, 76, 60, 0.8);
        }

        .search-chat-btn {
            background: rgba(30, 42, 42, 0.7);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }

        .back-btn {
            display: none;
            background: rgba(30, 42, 42, 0.7);
            border: none;
            color: #2a9d8f;
            font-size: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }

        .message {
            max-width: 70%;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            word-wrap: break-word;
            font-size: 0.9rem;
            position: relative;
            display: inline-block;
            width: auto;
            background: rgba(30, 36, 36, 0.7);
            backdrop-filter: blur(5px);
            transition: transform 0.2s ease;
        }

        .message.own {
            align-self: flex-end;
            background: rgba(42, 157, 143, 0.7);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(30, 36, 36, 0.7);
            border-bottom-left-radius: 0.25rem;
        }

        .message.swipe-left {
            transform: translateX(-20px);
        }

        .message.swipe-right {
            transform: translateX(20px);
        }

        .reply-indicator {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 0.2rem;
            padding-left: 0.5rem;
            border-left: 2px solid #2a9d8f;
        }

        .message .name {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }

        .message .time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 0.2rem;
        }

        .message .status {
            font-size: 0.6rem;
            margin-left: 0.3rem;
        }

        .message .edited-badge {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: 0.3rem;
        }

        .forward-badge {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-bottom: 0.2rem;
        }

        .sticker {
            max-width: 120px;
            max-height: 120px;
            cursor: pointer;
        }

        .message img {
            max-width: 200px;
            border-radius: 1rem;
            margin-top: 0.3rem;
            cursor: pointer;
            background: transparent;
            border: none;
            display: block;
        }

        .message video {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 0.3rem;
            cursor: pointer;
            background: transparent;
            border: none;
            display: block;
            transition: all 0.3s ease;
        }

        .message video.zoomed {
            position: relative;
            width: 250px;
            height: 250px;
            z-index: 10;
        }

        .message audio {
            margin-top: 0.3rem;
            max-width: 200px;
            background: transparent;
            border: none;
        }

        .message a {
            color: #2a9d8f;
            text-decoration: none;
        }

        .reactions {
            display: flex;
            gap: 0.2rem;
            margin-top: 0.2rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .reaction {
            background: rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.1rem 0.4rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-area {
            display: inline-block;
            width: 30px;
            margin-left: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .action-area {
            opacity: 0.7;
        }

        .context-menu {
            position: fixed;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            overflow: hidden;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(42, 157, 143, 0.3);
            min-width: 150px;
        }

        .context-menu-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .context-menu-item:hover {
            background: rgba(42, 58, 58, 0.7);
        }

        .reaction-menu {
            position: fixed;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(42, 157, 143, 0.3);
        }

        .reaction-emoji {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.3rem;
            transition: transform 0.1s;
        }

        .search-messages-panel {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(26, 31, 31, 0.95);
            backdrop-filter: blur(20px);
            padding: 0.8rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 60;
            border-bottom: 1px solid rgba(42, 157, 143, 0.3);
        }

        .search-messages-panel.show {
            display: flex;
        }

        .search-messages-panel input {
            background: rgba(30, 42, 42, 0.8);
            border: 1px solid rgba(42, 157, 143, 0.3);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
        }

        .search-results-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(42, 157, 143, 0.2);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .search-result-item:hover {
            background: rgba(42, 157, 143, 0.3);
        }

        .reply-bar {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: rgba(26, 31, 31, 0.95);
            backdrop-filter: blur(20px);
            padding: 0.5rem 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid rgba(42, 157, 143, 0.3);
            z-index: 55;
        }

        .reply-bar.show {
            display: flex;
        }

        .reply-bar .reply-info {
            flex: 1;
            font-size: 0.8rem;
        }

        .reply-bar .cancel-reply {
            background: rgba(231, 76, 60, 0.7);
            border: none;
            border-radius: 1rem;
            padding: 0.2rem 0.8rem;
            color: white;
            cursor: pointer;
        }

        .sticker-panel {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: rgba(26, 31, 31, 0.95);
            backdrop-filter: blur(20px);
            padding: 0.8rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 55;
            border-top: 1px solid rgba(42, 157, 143, 0.3);
        }

        .sticker-panel.show {
            display: flex;
        }

        .sticker-list {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem;
        }

        .sticker-item {
            width: 60px;
            height: 60px;
            cursor: pointer;
            border-radius: 1rem;
            transition: transform 0.1s;
        }

        .sticker-item:hover {
            transform: scale(1.05);
        }

        .add-sticker-btn {
            background: rgba(42, 157, 143, 0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: #2a9d8f;
            font-style: italic;
            padding: 0.2rem 1rem;
            background: rgba(10, 15, 15, 0.8);
            flex-shrink: 0;
        }

        .input-area {
            padding: 0.5rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(15, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            min-height: 56px;
        }

        .media-btn {
            background: rgba(30, 42, 42, 0.7);
            border: none;
            font-size: 1.2rem;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        #message-input {
            flex: 1;
            background: rgba(26, 31, 31, 0.7);
            border: 1px solid rgba(42, 157, 143, 0.3);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 1rem;
            height: 40px;
            outline: none;
        }

        .action-btn {
            background: #2a9d8f;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.recording {
            background: #e74c3c !important;
            animation: pulse 0.5s infinite;
        }

        .voice-recording-panel {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            padding: 0.5rem 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(42, 157, 143, 0.3);
            z-index: 50;
        }

        .voice-recording-panel.show {
            display: flex;
        }

        .voice-recording-panel .mic-icon {
            width: 30px;
            height: 30px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            animation: pulse 0.5s infinite;
        }

        .voice-recording-panel .recording-time {
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
        }

        .voice-recording-panel .stop-btn {
            background: rgba(231, 76, 60, 0.7);
            border: none;
            border-radius: 1.5rem;
            padding: 0.2rem 0.8rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .locked-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            padding: 0.5rem 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(42, 157, 143, 0.3);
            z-index: 50;
        }

        .locked-panel.show {
            display: flex;
        }

        .locked-panel .send-btn, .locked-panel .cancel-btn {
            background: rgba(42, 157, 143, 0.7);
            border: none;
            border-radius: 1.5rem;
            padding: 0.3rem 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .locked-panel .cancel-btn {
            background: rgba(231, 76, 60, 0.7);
        }

        .video-preview {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(42, 157, 143, 0.5);
            z-index: 100;
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 300;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .call-modal.show {
            display: flex;
        }

        .call-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .remote-video {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remote-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-video {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #2a9d8f;
            background: #000;
            z-index: 10;
        }

        .local-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
        }

        .call-control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .call-control-btn.end-call {
            background: #e74c3c;
            color: white;
        }

        .call-control-btn.toggle-mic {
            background: #2a9d8f;
            color: white;
        }

        .call-control-btn.toggle-video {
            background: #2a9d8f;
            color: white;
        }

        .call-control-btn.muted {

    <script>
        const socket = io();

        let currentUser = null;
        let currentChat = null;
        let friendsList = [];
        let groupsList = [];
        let allChats = [];
        let currentMessages = [];
        let stickers = [];
        let contextMenu = null;
        let reactionMenu = null;
        let currentMode = 'voice';
        let isRecording = false;
        let isRecordingLocked = false;
        let isPaused = false;
        let isSending = false;
        let isTextSending = false;
        let selectedGroupMembers = new Set();
        
        let mediaRecorder = null;
        let videoRecorder = null;
        let audioChunks = [];
        let videoChunks = [];
        let currentStream = null;
        let recordingStartTime = null;
        let recordingInterval = null;
        let recordedBlob = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let pressTimer = null;
        let isLongPress = false;
        let currentSwipeMessage = null;
        let forwardMessage = null;
        let replyToMessage = null;

        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;
        let currentCallRoom = null;
        let isCallActive = false;
        let pendingCallId = null;

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const friendsPanel = document.getElementById('friends-panel');
        const friendsHeader = document.getElementById('friends-header');
        const friendsListDiv = document.getElementById('friends-list');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const actionBtn = document.getElementById('action-btn');
        const selectedChatName = document.getElementById('selected-chat-name');
        const currentUserNameSpan = document.getElementById('current-user-name');
        const currentUserAvatar = document.getElementById('current-user-avatar');
        const typingIndicator = document.getElementById('typing-indicator');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const mobileOverlay = document.getElementById('mobile-overlay');
        
        const voiceRecordingPanel = document.getElementById('voice-recording-panel');
        const voiceRecordingTimeSpan = document.getElementById('voice-recording-time');
        const stopVoiceBtn = document.getElementById('stop-voice-recording');
        const lockedPanel = document.getElementById('locked-panel');
        const sendLockedBtn = document.getElementById('send-locked');
        const cancelLockedBtn = document.getElementById('cancel-locked');
        const videoPreview = document.getElementById('video-preview');
        const previewVideo = document.getElementById('preview-video');
        const searchChatBtn = document.getElementById('search-chat-btn');
        const searchMessagesPanel = document.getElementById('search-messages-panel');
        const searchMessagesInput = document.getElementById('search-messages-input');
        const searchMessagesResults = document.getElementById('search-messages-results');
        const replyBar = document.getElementById('reply-bar');
        const replyInfo = document.getElementById('reply-info');
        const cancelReplyBtn = document.getElementById('cancel-reply');
        const forwardSelectPanel = document.getElementById('forward-select-panel');
        const forwardFriendsList = document.getElementById('forward-friends-list');
        const cancelForwardBtn = document.getElementById('cancel-forward');
        const stickerBtn = document.getElementById('sticker-btn');
        const stickerPanel = document.getElementById('sticker-panel');
        const stickerList = document.getElementById('sticker-list');
        const addStickerBtn = document.getElementById('add-sticker-btn');
        const createGroupBtn = document.getElementById('create-group-btn');
        const createGroupModal = document.getElementById('create-group-modal');
        const groupNameInput = document.getElementById('group-name-input');
        const groupMembersList = document.getElementById('group-members-list');
        const confirmCreateGroup = document.getElementById('confirm-create-group');
        const cancelCreateGroup = document.getElementById('cancel-create-group');
        const chatHeaderAvatar = document.getElementById('chat-header-avatar');
        const callButtons = document.getElementById('call-buttons');
        const audioCallBtn = document.getElementById('audio-call-btn');
        const videoCallBtn = document.getElementById('video-call-btn');
        const callModal = document.getElementById('call-modal');
        const incomingCallModal = document.getElementById('incoming-call-modal');
        const remoteVideo = document.getElementById('remote-video');
        const localVideo = document.getElementById('local-video');
        const toggleMicBtn = document.getElementById('toggle-mic-btn');
        const toggleVideoBtn = document.getElementById('toggle-video-btn');
        const endCallBtn = document.getElementById('end-call-btn');
        const acceptCallBtn = document.getElementById('accept-call');
        const rejectCallBtn = document.getElementById('reject-call');
        const callStatusSpan = document.getElementById('call-status');
        
        const profileModal = document.getElementById('profile-modal');
        const profileBtn = document.getElementById('profile-btn');
        const profileAvatar = document.getElementById('profile-avatar');
        const profileUsername = document.getElementById('profile-username');
        const profileAvatarInput = document.getElementById('profile-avatar-input');
        const updateProfileBtn = document.getElementById('update-profile-btn');
        const closeProfileBtn = document.getElementById('close-profile-btn');

        async function updateProfile() {
            const newUsername = profileUsername.value.trim();
            if (!newUsername) {
                alert('Username cannot be empty');
                return;
            }
            
            const res = await fetch('/api/update_profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: currentUser.id,
                    username: newUsername
                })
            });
            
            if (res.ok) {
                currentUser.username = newUsername;
                currentUserNameSpan.innerText = newUsername;
                alert('Profile updated!');
            }
        }

        async function uploadProfileAvatar(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user_id', currentUser.id);
            const res = await fetch('/upload_avatar', { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                currentUser.avatar = data.url;
                currentUserAvatar.src = data.url;
                profileAvatar.src = data.url;
                alert('Avatar updated!');
            }
        }

        profileBtn.onclick = () => {
            profileUsername.value = currentUser.username;
            profileAvatar.src = currentUser.avatar || '/static/default-avatar.png';
            profileModal.classList.add('show');
        };
        
        closeProfileBtn.onclick = () => profileModal.classList.remove('show');
        profileAvatar.onclick = () => profileAvatarInput.click();
        profileAvatarInput.onchange = (e) => {
            if (e.target.files[0]) uploadProfileAvatar(e.target.files[0]);
        };
        updateProfileBtn.onclick = updateProfile;

        async function startCall(userId, type) {
            if (!currentUser || !userId) return;
            
            const callId = Math.random().toString(36).substring(2, 10);
            currentCallId = callId;
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: type === 'video'
                });
                
                if (type === 'video') {
                    localVideo.srcObject = localStream;
                    toggleVideoBtn.style.display = 'flex';
                } else {
                    toggleVideoBtn.style.display = 'none';
                }
                
                socket.emit('call_user', {
                    from_user_id: currentUser.id,
                    to_user_id: userId,
                    type: type,
                    call_id: callId
                });
                
                callModal.classList.add('show');
                callStatusSpan.innerText = `Calling ${currentChat?.username || 'user'}...`;
                setupPeerConnection(type);
                
            } catch (err) {
                console.error('Failed to start call:', err);
                alert('Cannot access microphone/camera');
                endCall();
            }
        }

        function setupPeerConnection(isVideo) {
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc_ice_candidate', {
                        to_user_id: currentChat?.id,
                        candidate: event.candidate,
                        call_id: currentCallId
                    });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'disconnected' ||
                    peerConnection.iceConnectionState === 'failed' ||
                    peerConnection.iceConnectionState === 'closed') {
                    endCall();
                }
            };
        }

        async function createOffer() {
            if (!peerConnection) return;
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('webrtc_offer', {
                to_user_id: currentChat?.id,
                offer: offer,
                call_id: currentCallId,
                from_user_id: currentUser.id
            });
        }

        async function createAnswer(offer, fromUserId) {
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc_ice_candidate', {
                        to_user_id: fromUserId,
                        candidate: event.candidate,
                        call_id: currentCallId
                    });
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('webrtc_answer', {
                to_user_id: fromUserId,
                answer: answer,
                call_id: currentCallId
            });
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            toggleVideoBtn.style.display = 'flex';
            
            if (currentCallId) {
                socket.emit('end_call', {
                    call_id: currentCallId,
                    user_id: currentUser?.id
                });
            }
            
            callModal.classList.remove('show');
            incomingCallModal.classList.remove('show');
            isCallActive = false;
            currentCallId = null;
            currentCallRoom = null;
        }

        function toggleMicrophone() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    toggleMicBtn.classList.toggle('muted', !audioTrack.enabled);
                    toggleMicBtn.innerHTML = audioTrack.enabled ? '🎤' : '🔇';
                }

        async function startVoiceRecording() {
            if (!currentChat || isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentStream = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                recordedBlob = null;
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    }
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                voiceRecordingPanel.classList.add('show');
                startRecordingTimer();
            } catch (err) {
                console.error('Microphone error:', err);
                alert('Please allow microphone access');
            }
        }

        function pauseVoiceRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.pause();
                isPaused = true;
                stopVoiceBtn.innerHTML = '▶️';
            }
        }

        function resumeVoiceRecording() {
            if (mediaRecorder && mediaRecorder.state === 'paused') {
                mediaRecorder.resume();
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
            }
        }

        function stopVoiceRecording() {
            if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
                mediaRecorder.stop();
            }
            voiceRecordingPanel.classList.remove('show');
            if (recordingInterval) clearInterval(recordingInterval);
            isRecording = false;
        }

        async function startVideoRecording() {
            if (!currentChat || isRecording) return;
            try {
                videoPreview.classList.add('show');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                currentStream = stream;
                previewVideo.srcObject = stream;
                
                videoRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                videoChunks = [];
                recordedBlob = null;
                
                videoRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) videoChunks.push(e.data);
                };
                
                videoRecorder.onstop = () => {
                    if (videoChunks.length > 0) {
                        recordedBlob = new Blob(videoChunks, { type: 'video/webm' });
                    }
                    if (currentStream && !isRecordingLocked) {
                        currentStream.getTracks().forEach(t => t.stop());
                        currentStream = null;
                    }
                    previewVideo.srcObject = null;
                    if (!isRecordingLocked) {
                        videoPreview.classList.remove('show');
                    }
                };
                
                videoRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                startRecordingTimer();
            } catch (err) {
                console.error('Camera error:', err);
                alert('Please allow camera access');
                videoPreview.classList.remove('show');
            }
        }

        function stopVideoRecording() {
            if (videoRecorder && videoRecorder.state === 'recording') {
                videoRecorder.stop();
            }
            if (currentStream && !isRecordingLocked) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            if (recordingInterval) clearInterval(recordingInterval);
            isRecording = false;
        }

        function startRecordingTimer() {
            recordingInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                voiceRecordingTimeSpan.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

                    { type: currentMode === 'voice' ? 'audio/webm' : 'video/webm' });
                
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {

                    if (replyToMessage) {

                    socket.emit('private_message', {

                        to_chat_id: currentChat.id,
                        message: messageData
                    });
                    replyToMessage = null;
                    replyBar.classList.remove('show');
                }
                isSending = false;
                recordedBlob = null;
            }
        }

        function onTouchStart(e) {
            if (!currentChat) return;
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            
            const element = document.elementFromPoint(touchStartX, touchStartY);
            currentSwipeMessage = element?.closest('.message');
            
            if (currentSwipeMessage) {
                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    const messageId = currentSwipeMessage.dataset.messageId;
                    const message = currentMessages.find(m => m.id === messageId);
                    if (message) {
                        showContextMenuForForward(touchStartX, touchStartY, message);
                    }
                }, 500);
            }
        }

        function onTouchMove(e) {
            if (!currentSwipeMessage) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            
            if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                
                const isOwn = currentSwipeMessage.classList.contains('own');
                if ((isOwn && deltaX < 0) || (!isOwn && deltaX > 0)) {
                    const messageId = currentSwipeMessage.dataset.messageId;
                    const message = currentMessages.find(m => m.id === messageId);
                    if (message) {
                        showReplyBar(message);
                        currentSwipeMessage.classList.add(isOwn ? 'swipe-left' : 'swipe-right');
                        setTimeout(() => {
                            currentSwipeMessage.classList.remove('swipe-left', 'swipe-right');
                        }, 200);
                    }
                }
                currentSwipeMessage = null;
            }
        }

        function onTouchEnd() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            currentSwipeMessage = null;
            isLongPress = false;
        }

        function showContextMenuForForward(x, y, message) {
            if (contextMenu) contextMenu.remove();
            contextMenu = document.createElement('div');
            contextMenu.className = 'context-menu';
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';

            if (!currentChat) return;
            const hasText = messageInput.value.trim().length > 0;
            if (hasText) return;
            
            e.preventDefault();
            isLongPress = false;
            
            if (e.touches) {
                touchStartY = e.touches[0].clientY;
            }
            
            pressTimer = setTimeout(() => {
                isLongPress = true;
                if (currentMode === 'voice') {
                    startVoiceRecording();
                } else {
                    startVideoRecording();
                }
            }, 300);
        }

        function onActionButtonMove(e) {
            if (!isRecording || !e.touches) return;
            const deltaY = touchStartY - e.touches[0].clientY;
            if (deltaY > 50 && !isRecordingLocked) {
                lockRecording();
            }
        }

        function onActionButtonEnd(e) {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            if (!currentChat) return;
            
            const hasText = messageInput.value.trim().length > 0;
            if (hasText) {
                sendMessage();
            } else if (isLongPress && isRecording && !isRecordingLocked) {
                if (currentMode === 'voice') {
                    stopVoiceRecording();
                } else {
                    stopVideoRecording();
                    videoPreview.classList.remove('show');
                }
                sendRecordedMedia();
            } else if (!isLongPress) {
                switchMode();
            }
            isLongPress = false;
            isRecording = false;
        }

            if (pressTimer) {

        function zoomVideo(videoElement) {
            if (videoElement.classList.contains('zoomed')) {

                videoElement.style.position = '';
                videoElement.style.width = '';
                videoElement.style.height = '';
                videoElement.controls = false;
                videoElement.pause();
            } else {
                document.querySelectorAll('.message video').forEach(v => {
                    v.classList.remove('zoomed');
                    v.style.position = '';
                    v.style.width = '';
                    v.style.height = '';
                    v.controls = false;
                });
                
                videoElement.classList.add('zoomed');
                videoElement.style.position = 'relative';
                videoElement.style.width = '250px';
                videoElement.style.height = '250px';
                videoElement.controls = true;
                videoElement.play();
                
                videoElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                videoElement.addEventListener('ended', () => {
                    videoElement.classList.remove('zoomed');

            if (msg.type === 'video') return `<video src="${msg.content}" playsinline autoplay loop muted></video>`;
            if (msg.type === 'voice') return `<audio src="${msg.content}" controls></audio>`;
            if (msg.type === 'file') return `<a href="${msg.content}" target="_blank">📎 ${msg.filename || 'File'}</a>`;

        async function registerPushNotifications() {
            if (!('serviceWorker' in navigator)) {
                console.log('Service Worker not supported');
                return;
            }
            
            if (!('PushManager' in window)) {
                console.log('Push notifications not supported');
                return;

            try {
                const registration = await navigator.serviceWorker.ready;
                console.log('Service Worker ready for push');
                
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    const checkUserInterval = setInterval(async () => {
                        if (currentUser && currentUser.id) {
                            clearInterval(checkUserInterval);
                            
                            try {
                                const vapidRes = await fetch('/api/vapid_public_key');
                                const vapidData = await vapidRes.json();
                                
                                if (vapidData.public_key && vapidData.public_key !== 'YOUR_PUBLIC_KEY_HERE') {
                                    const applicationServerKey = urlBase64ToUint8Array(vapidData.public_key);
                                    
                                    const subscription = await registration.pushManager.subscribe({
                                        userVisibleOnly: true,
                                        applicationServerKey: applicationServerKey
                                    });
                                    
                                    await fetch('/api/subscribe_push', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            user_id: currentUser.id,
                                            subscription: subscription
                                        })
                                    });
                                    
                                    console.log('Push notifications enabled');
                                    
                                    registration.showNotification('FAX Messenger', {
                                        body: 'Push notifications enabled!',
                                        icon: '/static/fax-icon-192.png',
                                        vibrate: [200, 100, 200]
                                    });
                                } else {
                                    console.log('VAPID key not configured');
                                }
                            } catch (err) {
                                console.error('Push subscription error:', err);
                            }
                        }
                    }, 500);
                }
            } catch (err) {
                console.error('Service Worker not ready:', err);
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        if (navigator.serviceWorker) {
            navigator.serviceWorker.addEventListener('message', (event) => {
                const data = event.data;
                if (data.type === 'ANSWER_CALL' && pendingCallId) {
                    acceptCallBtn?.click();
                } else if (data.type === 'DECLINE_CALL' && pendingCallId) {
                    rejectCallBtn?.click();
                } else if (data.type === 'OPEN_CHAT' && data.chatId) {
                    const chat = allChats?.find(c => c.id === data.chatId);
                    if (chat) selectChat(chat);
                }
            });
        }

        window.addEventListener('load', () => {
            setTimeout(registerPushNotifications, 3000);
        });

        setInterval(() => {
            if (socket && socket.connected) {
                socket.emit('ping');
            }
        }, 25000);
    </script>
