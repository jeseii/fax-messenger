<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>FAX Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background: #0a0f0f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0a0f0f;
            color: #e0e0e0;
        }

        .glass {
            background: rgba(15, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 157, 143, 0.2);
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0f;
            z-index: 100;
        }

        .login-box {
            background: rgba(26, 31, 31, 0.8);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid rgba(42, 157, 143, 0.3);
            width: 90%;
            max-width: 350px;
        }

        .login-box h1 {
            color: #2a9d8f;
            margin-bottom: 1rem;
        }

        .login-box input {
            background: rgba(30, 42, 42, 0.8);
            border: 1px solid rgba(42, 157, 143, 0.3);
            color: white;
            padding: 0.75rem;
            border-radius: 2rem;
            width: 100%;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .login-box button {
            background: #2a9d8f;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .friends-panel {
            width: 280px;
            background: rgba(15, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(42, 157, 143, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }

        .friends-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(10, 15, 15, 0.8);
            cursor: pointer;
        }

        .friends-header h3 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .current-user {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.3rem;
        }

        .search-box {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(30, 42, 42, 0.3);
        }

        .search-box input {
            width: 100%;
            background: rgba(26, 31, 31, 0.8);
            border: 1px solid rgba(42, 157, 143, 0.3);
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            margin-top: 0.5rem;
        }

        .search-result-item {
            padding: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(30, 42, 42, 0.3);
        }

        .add-friend-btn {
            background: #2a9d8f;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .friend-item {
            padding: 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .friend-item:hover {
            background: rgba(30, 42, 42, 0.4);
        }

        .friend-item.active {
            background: #2a9d8f;
            color: white;
        }

        .friend-name {
            font-weight: 500;
        }

        .online-status {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }

        .online-dot.online {
            background: #2a9d8f;
        }

        .online-dot.offline {
            background: #666;
        }

        .unread-badge {
            background: #e74c3c;
            color: white;
            border-radius: 1rem;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .remove-friend-small {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.4rem;
            border-radius: 1rem;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 15, 15, 0.9);
            height: 100%;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(15, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h4 {
            color: #2a9d8f;
            font-size: 1rem;
        }

        .back-btn {
            display: none;
            background: rgba(30, 42, 42, 0.7);
            border: none;
            color: #2a9d8f;
            font-size: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
        }

        .remove-friend-btn {
            background: #e74c3c;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }

        .message {
            max-width: 70%;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            word-wrap: break-word;
            font-size: 0.9rem;
            position: relative;
            display: inline-block;
            width: auto;
            background: rgba(30, 36, 36, 0.7);
            backdrop-filter: blur(5px);
        }

        .message.own {
            align-self: flex-end;
            background: rgba(42, 157, 143, 0.7);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(30, 36, 36, 0.7);
            border-bottom-left-radius: 0.25rem;
        }

        .message .name {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }

        .message .time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 0.2rem;
        }

        .message .status {
            font-size: 0.6rem;
            margin-left: 0.3rem;
        }

        .message .edited-badge {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: 0.3rem;
        }

        .message img {
            max-width: 200px;
            border-radius: 1rem;
            margin-top: 0.3rem;
            cursor: pointer;
            background: transparent;
            border: none;
            display: block;
        }

        .message video {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 0.3rem;
            cursor: pointer;
            background: transparent;
            border: none;
            display: block;
            transition: all 0.3s ease;
        }

        .message video.zoomed {
            position: relative;
            width: 250px;
            height: 250px;
            z-index: 10;
        }

        .message audio {
            margin-top: 0.3rem;
            max-width: 200px;
            background: transparent;
            border: none;
        }

        .message a {
            color: #2a9d8f;
            text-decoration: none;
        }

        .reactions {
            display: flex;
            gap: 0.2rem;
            margin-top: 0.2rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .reaction {
            background: rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.1rem 0.4rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-area {
            display: inline-block;
            width: 30px;
            margin-left: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .action-area {
            opacity: 0.7;
        }

        .context-menu {
            position: fixed;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            overflow: hidden;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(42, 157, 143, 0.3);
            min-width: 150px;
        }

        .context-menu-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .context-menu-item:hover {
            background: rgba(42, 58, 58, 0.7);
        }

        .reaction-menu {
            position: fixed;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(42, 157, 143, 0.3);
        }

        .reaction-emoji {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.3rem;
            transition: transform 0.1s;
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: #2a9d8f;
            font-style: italic;
            padding: 0.2rem 1rem;
            background: rgba(10, 15, 15, 0.8);
            flex-shrink: 0;
        }

        .input-area {
            padding: 0.5rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid rgba(42, 157, 143, 0.2);
            background: rgba(15, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            min-height: 56px;
        }

        .media-btn {
            background: rgba(30, 42, 42, 0.7);
            border: none;
            font-size: 1.2rem;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        #message-input {
            flex: 1;
            background: rgba(26, 31, 31, 0.7);
            border: 1px solid rgba(42, 157, 143, 0.3);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 1rem;
            height: 40px;
            outline: none;
        }

        .action-btn {
            background: #2a9d8f;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.recording {
            background: #e74c3c !important;
            animation: pulse 0.5s infinite;
        }

        .voice-recording-panel {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            padding: 0.5rem 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(42, 157, 143, 0.3);
            z-index: 50;
        }

        .voice-recording-panel.show {
            display: flex;
        }

        .voice-recording-panel .mic-icon {
            width: 30px;
            height: 30px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            animation: pulse 0.5s infinite;
        }

        .voice-recording-panel .recording-time {
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
        }

        .voice-recording-panel .stop-btn {
            background: rgba(231, 76, 60, 0.7);
            border: none;
            border-radius: 1.5rem;
            padding: 0.2rem 0.8rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .locked-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            padding: 0.5rem 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(42, 157, 143, 0.3);
            z-index: 50;
        }

        .locked-panel.show {
            display: flex;
        }

        .locked-panel .send-btn, .locked-panel .cancel-btn {
            background: rgba(42, 157, 143, 0.7);
            border: none;
            border-radius: 1.5rem;
            padding: 0.3rem 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .locked-panel .cancel-btn {
            background: rgba(231, 76, 60, 0.7);
        }

        .video-preview {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(26, 31, 31, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(42, 157, 143, 0.5);
            z-index: 100;
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @media (max-width: 600px) {
            .friends-panel {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                z-index: 30;
                transition: transform 0.3s ease;
            }
            .friends-panel.open {
                transform: translateX(0);
            }
            .back-btn {
                display: block;
            }
            .mobile-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 25;
            }
            .mobile-overlay.show {
                display: block;
            }
            .media-btn, .action-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            #message-input {
                height: 36px;
                font-size: 14px;
                padding: 0.5rem 0.8rem;
            }
            .input-area {
                padding: 0.4rem 0.6rem;
                gap: 0.4rem;
                min-height: 52px;
            }
            .video-preview {
                width: 180px;
                height: 180px;
            }
            .message {
                max-width: 85%;
            }
            .locked-panel {
                bottom: 120px;
                right: 10px;
            }
            .message video.zoomed {
                width: 180px;
                height: 180px;
            }
        }

        @media (min-width: 601px) {
            .back-btn {
                display: none;
            }
        }

        .mobile-overlay {
            display: none;
        }
    </style>
</head>
<body>
    <div id="mobile-overlay" class="mobile-overlay"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1>📠 FAX</h1>
            <input type="text" id="username-input" placeholder="Your name" maxlength="20">
            <button id="join-btn">Join Chat</button>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display:none">
        <div id="friends-panel" class="friends-panel">
            <div class="friends-header" id="friends-header">
                <h3>📠 FAX</h3>
                <div class="current-user" id="current-user-name"></div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search users...">
                <div id="search-results" class="search-results" style="display: none;"></div>
            </div>
            <div class="friends-list" id="friends-list">
                <div class="empty-state">No friends yet. Search and add!</div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <button id="back-btn" class="back-btn">← Back</button>
                <h4 id="selected-chat-name">Select a chat</h4>
                <button id="remove-friend-btn" class="remove-friend-btn" style="display: none;">Remove</button>
            </div>

            <div class="messages-area" id="messages-area">
                <div class="empty-state">Choose a friend to start messaging</div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;"></div>

            <div class="input-area">
                <button id="attach-file" class="media-btn" title="Attach file">📎</button>
                <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
                <button id="action-btn" class="action-btn" title="Voice message">🎤</button>
            </div>
        </div>
    </div>

    <div id="voice-recording-panel" class="voice-recording-panel">
        <div class="mic-icon">🎤</div>
        <div class="recording-time" id="voice-recording-time">0:00</div>
        <button id="stop-voice-recording" class="stop-btn">⏸️</button>
    </div>

    <div id="locked-panel" class="locked-panel">
        <button id="send-locked" class="send-btn">Отправить</button>
        <button id="cancel-locked" class="cancel-btn">Отмена</button>
    </div>

    <div id="video-preview" class="video-preview">
        <video id="preview-video" autoplay muted playsinline></video>
    </div>

    <script>
        const socket = io();

        let currentUser = null;
        let currentChatUser = null;
        let friendsList = [];
        let currentMessages = [];
        let contextMenu = null;
        let reactionMenu = null;
        let currentMode = 'voice';
        let isRecording = false;
        let isRecordingLocked = false;
        let isPaused = false;
        let isSending = false;
        let isTextSending = false;
        
        let mediaRecorder = null;
        let videoRecorder = null;
        let audioChunks = [];
        let videoChunks = [];
        let currentStream = null;
        let recordingStartTime = null;
        let recordingInterval = null;
        let recordedBlob = null;
        let touchStartY = 0;
        let pressTimer = null;
        let isLongPress = false;

        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const friendsPanel = document.getElementById('friends-panel');
        const friendsHeader = document.getElementById('friends-header');
        const friendsListDiv = document.getElementById('friends-list');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const actionBtn = document.getElementById('action-btn');
        const selectedChatName = document.getElementById('selected-chat-name');
        const currentUserNameSpan = document.getElementById('current-user-name');
        const typingIndicator = document.getElementById('typing-indicator');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const removeFriendBtn = document.getElementById('remove-friend-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        
        const voiceRecordingPanel = document.getElementById('voice-recording-panel');
        const voiceRecordingTimeSpan = document.getElementById('voice-recording-time');
        const stopVoiceBtn = document.getElementById('stop-voice-recording');
        const lockedPanel = document.getElementById('locked-panel');
        const sendLockedBtn = document.getElementById('send-locked');
        const cancelLockedBtn = document.getElementById('cancel-locked');
        const videoPreview = document.getElementById('video-preview');
        const previewVideo = document.getElementById('preview-video');

        function saveUserToStorage(user) {
            if (!user) return;
            localStorage.setItem('fax_user', JSON.stringify({
                id: user.id,
                username: user.username,
                savedAt: Date.now()
            }));
        }

        function loadUserFromStorage() {
            try {
                const data = localStorage.getItem('fax_user');
                if (data) {
                    const user = JSON.parse(data);
                    if (Date.now() - user.savedAt < 30 * 24 * 60 * 60 * 1000) {
                        return user;
                    }
                    localStorage.removeItem('fax_user');
                }
            } catch(e) {}
            return null;
        }

        async function tryAutoLogin() {
            const savedUser = loadUserFromStorage();
            if (!savedUser) return false;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: savedUser.username })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = { id: data.user_id, username: savedUser.username };
                    currentUserNameSpan.innerText = savedUser.username;
                    saveUserToStorage(currentUser);
                    socket.emit('register', { user_id: currentUser.id, username: currentUser.username });
                    loginScreen.style.display = 'none';
                    appContainer.style.display = 'flex';
                    loadFriends();
                    return true;
                }
            } catch(e) {
                console.error('Auto login failed:', e);
            }
            return false;
        }

        function openFriendsPanel() {
            friendsPanel.classList.add('open');
            mobileOverlay.classList.add('show');
        }

        function closeFriendsPanel() {
            friendsPanel.classList.remove('open');
            mobileOverlay.classList.remove('show');
        }

        friendsHeader.onclick = () => {
            if (window.innerWidth <= 600) {
                if (friendsPanel.classList.contains('open')) {
                    closeFriendsPanel();
                } else {
                    openFriendsPanel();
                }
            }
        };

        backBtn.onclick = () => {
            if (window.innerWidth <= 600) {
                openFriendsPanel();
            }
        };

        mobileOverlay.onclick = closeFriendsPanel;

        function updateActionButton() {
            const hasText = messageInput.value.trim().length > 0;
            if (hasText && currentChatUser) {
                actionBtn.innerHTML = '➤';
                actionBtn.title = 'Send message';
            } else if (currentChatUser) {
                if (currentMode === 'voice') {
                    actionBtn.innerHTML = '🎤';
                    actionBtn.title = 'Voice message (tap to switch to video, hold to record)';
                } else {
                    actionBtn.innerHTML = '🎥';
                    actionBtn.title = 'Video circle (tap to switch to voice, hold to record)';
                }
            } else {
                actionBtn.innerHTML = '🎤';
            }
        }

        function switchMode() {
            if (currentMode === 'voice') {
                currentMode = 'video';
            } else {
                currentMode = 'voice';
            }
            updateActionButton();
        }

        async function startVoiceRecording() {
            if (!currentChatUser || isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentStream = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                recordedBlob = null;
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    }
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                voiceRecordingPanel.classList.add('show');
                startRecordingTimer();
            } catch (err) {
                console.error('Microphone error:', err);
                alert('Please allow microphone access');
            }
        }

        function pauseVoiceRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.pause();
                isPaused = true;
                stopVoiceBtn.innerHTML = '▶️';
            }
        }

        function resumeVoiceRecording() {
            if (mediaRecorder && mediaRecorder.state === 'paused') {
                mediaRecorder.resume();
                isPaused = false;
                stopVoiceBtn.innerHTML = '⏸️';
            }
        }

        function stopVoiceRecording() {
            if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
                mediaRecorder.stop();
            }
            voiceRecordingPanel.classList.remove('show');
            if (recordingInterval) clearInterval(recordingInterval);
            isRecording = false;
        }

        async function startVideoRecording() {
            if (!currentChatUser || isRecording) return;
            try {
                videoPreview.classList.add('show');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                currentStream = stream;
                previewVideo.srcObject = stream;
                
                videoRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                videoChunks = [];
                recordedBlob = null;
                
                videoRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) videoChunks.push(e.data);
                };
                
                videoRecorder.onstop = () => {
                    if (videoChunks.length > 0) {
                        recordedBlob = new Blob(videoChunks, { type: 'video/webm' });
                    }
                    if (currentStream && !isRecordingLocked) {
                        currentStream.getTracks().forEach(t => t.stop());
                        currentStream = null;
                    }
                    previewVideo.srcObject = null;
                    if (!isRecordingLocked) {
                        videoPreview.classList.remove('show');
                    }
                };
                
                videoRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                startRecordingTimer();
            } catch (err) {
                console.error('Camera error:', err);
                alert('Please allow camera access');
                videoPreview.classList.remove('show');
            }
        }

        function stopVideoRecording() {
            if (videoRecorder && videoRecorder.state === 'recording') {
                videoRecorder.stop();
            }
            if (currentStream && !isRecordingLocked) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            if (recordingInterval) clearInterval(recordingInterval);
            isRecording = false;
        }

        function startRecordingTimer() {
            recordingInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                voiceRecordingTimeSpan.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        async function sendRecordedMedia() {
            if (recordedBlob && !isSending && currentChatUser) {
                isSending = true;
                const file = new File([recordedBlob], currentMode === 'voice' ? `voice_${Date.now()}.webm` : `video_${Date.now()}.webm`, 
                    { type: currentMode === 'voice' ? 'audio/webm' : 'video/webm' });
                
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    socket.emit('private_message', {
                        from_user_id: currentUser.id,
                        to_user_id: currentChatUser.id,
                        message: { type: currentMode === 'voice' ? 'voice' : 'video', content: data.url, name: data.name }
                    });
                }
                isSending = false;
                recordedBlob = null;
            }
        }

        function cancelRecording() {
            recordedBlob = null;
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            if (recordingInterval) clearInterval(recordingInterval);
            isRecording = false;
            isRecordingLocked = false;
            voiceRecordingPanel.classList.remove('show');
            videoPreview.classList.remove('show');
            lockedPanel.classList.remove('show');
        }

        function lockRecording() {
            if (!isRecording) return;
            isRecordingLocked = true;
            
            if (currentMode === 'voice') {
                stopVoiceRecording();
                lockedPanel.classList.add('show');
                voiceRecordingPanel.classList.add('show');
            } else {
                stopVideoRecording();
                lockedPanel.classList.add('show');
            }
            actionBtn.classList.remove('recording');
        }

        sendLockedBtn.onclick = () => {
            sendRecordedMedia();
            lockedPanel.classList.remove('show');
            isRecordingLocked = false;
            if (currentMode === 'voice') {
                voiceRecordingPanel.classList.remove('show');
            } else {
                videoPreview.classList.remove('show');
            }
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
        };

        cancelLockedBtn.onclick = () => {
            cancelRecording();
            lockedPanel.classList.remove('show');
            isRecordingLocked = false;
        };

        stopVoiceBtn.onclick = () => {
            if (isPaused) {
                resumeVoiceRecording();
            } else {
                pauseVoiceRecording();
            }
        };

        function onActionButtonStart(e) {
            if (!currentChatUser) return;
            const hasText = messageInput.value.trim().length > 0;
            if (hasText) return;
            
            e.preventDefault();
            isLongPress = false;
            
            if (e.touches) {
                touchStartY = e.touches[0].clientY;
            }
            
            pressTimer = setTimeout(() => {
                isLongPress = true;
                if (currentMode === 'voice') {
                    startVoiceRecording();
                } else {
                    startVideoRecording();
                }
            }, 300);
        }

        function onActionButtonMove(e) {
            if (!isRecording || !e.touches) return;
            const deltaY = touchStartY - e.touches[0].clientY;
            if (deltaY > 50 && !isRecordingLocked) {
                lockRecording();
            }
        }

        function onActionButtonEnd(e) {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            if (!currentChatUser) return;
            
            const hasText = messageInput.value.trim().length > 0;
            if (hasText) {
                sendMessage();
            } else if (isLongPress && isRecording && !isRecordingLocked) {
                if (currentMode === 'voice') {
                    stopVoiceRecording();
                } else {
                    stopVideoRecording();
                    videoPreview.classList.remove('show');
                }
                sendRecordedMedia();
            } else if (!isLongPress) {
                switchMode();
            }
            isLongPress = false;
            isRecording = false;
        }

        function onActionButtonCancel() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            if (isRecording && !isRecordingLocked) {
                cancelRecording();
            }
            isLongPress = false;
        }

        actionBtn.addEventListener('mousedown', onActionButtonStart);
        actionBtn.addEventListener('mouseup', onActionButtonEnd);
        actionBtn.addEventListener('touchstart', onActionButtonStart);
        actionBtn.addEventListener('touchmove', onActionButtonMove);
        actionBtn.addEventListener('touchend', onActionButtonEnd);
        actionBtn.addEventListener('touchcancel', onActionButtonCancel);
        
        window.addEventListener('mouseup', function(e) {
            if (e.target !== actionBtn && isRecording && !isRecordingLocked) {
                cancelRecording();
            }
        });

        document.getElementById('join-btn').onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username) {
                alert('Enter your name');
                return;
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            if (res.ok) {
                currentUser = { id: data.user_id, username };
                currentUserNameSpan.innerText = username;
                saveUserToStorage(currentUser);
                socket.emit('register', { user_id: currentUser.id, username });
                loginScreen.style.display = 'none';
                appContainer.style.display = 'flex';
                loadFriends();
            }
        };

        function loadFriends() {
            socket.emit('get_friends');
        }

        function selectChat(friend) {
            currentChatUser = friend;
            selectedChatName.innerText = friend.username;
            removeFriendBtn.style.display = 'block';
            updateActionButton();
            
            socket.emit('mark_as_read', {
                user_id: currentUser.id,
                other_user_id: friend.id
            });
            
            socket.emit('get_messages', {
                user_id: currentUser.id,
                other_user_id: friend.id
            });
            
            if (window.innerWidth <= 600) closeFriendsPanel();
        }

        function renderFriends() {
            if (friendsList.length === 0) {
                friendsListDiv.innerHTML = '<div class="empty-state">No friends yet. Search and add!</div>';
                return;
            }
            friendsListDiv.innerHTML = friendsList.map(f => `
                <div class="friend-item ${currentChatUser?.id === f.id ? 'active' : ''}" onclick="selectFriendAndClose('${f.id}')">
                    <div>
                        <div class="friend-name">${escapeHtml(f.username)}</div>
                        <div class="online-status">
                            <span class="online-dot ${f.online ? 'online' : 'offline'}"></span>
                            ${f.online ? 'Online' : 'Offline'}
                        </div>
                    </div>

                    <button class="remove-friend-small" onclick="event.stopPropagation(); removeFriend('${f.id}')">✕</button>
                </div>
            `).join('');

        window.selectFriendAndClose = function(friendId) {
            const f = friendsList.find(x => x.id === friendId);
            if (f) selectChat(f);
        };

        window.removeFriend = async (friendId) => {
            if (confirm('Remove this friend?')) {
                await fetch('/api/remove_friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })
                });
                if (currentChatUser?.id === friendId) {
                    currentChatUser = null;
                    selectedChatName.innerText = 'Select a chat';
                    removeFriendBtn.style.display = 'none';
                    messageInput.disabled = true;
                    messagesArea.innerHTML = '<div class="empty-state">Choose a friend to start messaging</div>';
                }
                loadFriends();
            }
        };

        removeFriendBtn.onclick = () => {
            if (currentChatUser) removeFriend(currentChatUser.id);
        };

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function getStatusIcon(status) {
            if (status === 'sent') return '✓';
            if (status === 'delivered') return '✓✓';
            if (status === 'read') return '✓✓';
            return '';
        }

        function zoomVideo(videoElement) {
            if (videoElement.classList.contains('zoomed')) {
                videoElement.classList.remove('zoomed');
                videoElement.style.position = '';
                videoElement.style.top = '';
                videoElement.style.left = '';
                videoElement.style.width = '';
                videoElement.style.height = '';
                videoElement.style.zIndex = '';
                videoElement.controls = false;
                videoElement.pause();
            } else {
                document.querySelectorAll('.message video').forEach(v => {
                    v.classList.remove('zoomed');
                    v.style.position = '';
                    v.style.top = '';
                    v.style.left = '';
                    v.style.width = '';
                    v.style.height = '';
                    v.style.zIndex = '';
                    v.controls = false;
                });
                
                videoElement.classList.add('zoomed');
                videoElement.style.position = 'relative';
                videoElement.style.top = '0';
                videoElement.style.left = '0';
                videoElement.style.width = '250px';
                videoElement.style.height = '250px';
                videoElement.style.zIndex = '10';
                videoElement.controls = true;
                videoElement.play();
                
                videoElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                videoElement.addEventListener('ended', () => {
                    videoElement.classList.remove('zoomed');
                    videoElement.style.position = '';
                    videoElement.style.top = '';
                    videoElement.style.left = '';
                    videoElement.style.width = '';
                    videoElement.style.height = '';
                    videoElement.style.zIndex = '';
                    videoElement.controls = false;
                }, { once: true });
            }
        }

        function renderMessages() {
            if (!currentMessages.length) {
                messagesArea.innerHTML = '<div class="empty-state">No messages yet. Say hello!</div>';
                return;
            }
            messagesArea.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.from_id === currentUser?.id ? 'own' : 'other'}" data-message-id="${msg.id}" data-message-type="${msg.type}" data-message-from="${msg.from_id}">
                    ${msg.from_id !== currentUser?.id ? `<div class="name">${escapeHtml(msg.from)}</div>` : ''}
                    <div>${renderMessageContent(msg)}</div>
                    ${msg.edited ? `<span class="edited-badge">edited</span>` : ''}
                    <div class="reactions">
                        ${renderReactions(msg)}
                    </div>
                    <span class="action-area">⚙️</span>
                    <div class="time">
                        ${formatTime(msg.timestamp)}
                        ${msg.from_id === currentUser?.id ? `<span class="status">${getStatusIcon(msg.status)}</span>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.message').forEach(msgEl => {
                const messageId = msgEl.dataset.messageId;
                const messageType = msgEl.dataset.messageType;
                const messageFrom = msgEl.dataset.messageFrom;
                
                const actionArea = msgEl.querySelector('.action-area');
                actionArea.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rect = msgEl.getBoundingClientRect();
                    if (messageFrom === currentUser?.id) {
                        showContextMenu(rect.left - 10, rect.top, messageId, messageType);
                    } else {
                        showReactionMenu(rect.right + 10, rect.top, messageId);
                    }
                });
                
                const video = msgEl.querySelector('video');
                if (video) {
                    video.addEventListener('click', (e) => {
                        e.stopPropagation();
                        zoomVideo(video);
                    });
                }
            });
            
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderReactions(msg) {
            if (!msg.reactions) return '';
            const reactions = {};
            for (const [userId, reaction] of Object.entries(msg.reactions)) {
                reactions[reaction] = (reactions[reaction] || 0) + 1;
            }
            return Object.entries(reactions).map(([reaction, count]) => 
                `<span class="reaction" data-reaction="${reaction}">${reaction} ${count}</span>`
            ).join('');
        }

        function renderMessageContent(msg) {
            if (msg.type === 'text') return escapeHtml(msg.content);
            if (msg.type === 'image') return `<img src="${msg.content}" alt="Image" onclick="window.open('${msg.content}', '_blank')">`;
            if (msg.type === 'video') return `<video src="${msg.content}" playsinline autoplay loop muted></video>`;
            if (msg.type === 'voice') return `<audio src="${msg.content}" controls></audio>`;
            if (msg.type === 'file') return `<a href="${msg.content}" target="_blank">📎 ${msg.filename || 'File'}</a>`;
            return msg.content;
        }

        function showContextMenu(x, y, messageId, messageType) {
            if (contextMenu) contextMenu.remove();
            contextMenu = document.createElement('div');
            contextMenu.className = 'context-menu';
            contextMenu.style.left = (x - 150) + 'px';
            contextMenu.style.top = y + 'px';
            
            if (messageType === 'text') {
                contextMenu.innerHTML = `
                    <div class="context-menu-item" data-action="edit">✏️ Edit</div>
                    <div class="context-menu-item" data-action="delete">🗑️ Delete</div>
                `;
                contextMenu.querySelector('[data-action="edit"]').onclick = () => {
                    editMessage(messageId);
                    contextMenu.remove();
                };
            } else {
                contextMenu.innerHTML = `
                    <div class="context-menu-item" data-action="delete">🗑️ Delete</div>
                `;
            }
            
            contextMenu.querySelector('[data-action="delete"]').onclick = () => {
                deleteMessage(messageId);
                contextMenu.remove();
            };
            
            document.body.appendChild(contextMenu);
            
            setTimeout(() => {
                document.addEventListener('click', () => contextMenu.remove(), { once: true });
            }, 10);
        }

        function showReactionMenu(x, y, messageId) {
            if (reactionMenu) reactionMenu.remove();
            reactionMenu = document.createElement('div');
            reactionMenu.className = 'reaction-menu';
            reactionMenu.style.left = x + 'px';
            reactionMenu.style.top = y + 'px';
            reactionMenu.innerHTML = `
                <span class="reaction-emoji" data-reaction="❤️">❤️</span>
                <span class="reaction-emoji" data-reaction="👍">👍</span>
                <span class="reaction-emoji" data-reaction="😂">😂</span>
                <span class="reaction-emoji" data-reaction="😮">😮</span>
                <span class="reaction-emoji" data-reaction="😢">😢</span>
                <span class="reaction-emoji" data-reaction="😡">😡</span>
            `;
            document.body.appendChild(reactionMenu);
            
            reactionMenu.querySelectorAll('.reaction-emoji').forEach(emoji => {
                emoji.onclick = () => {
                    addReaction(messageId, emoji.dataset.reaction);
                    reactionMenu.remove();
                };
            });
            
            setTimeout(() => {
                document.addEventListener('click', () => reactionMenu.remove(), { once: true });
            }, 10);
        }

        function editMessage(messageId) {
            const messageEl = document.querySelector(`.message[data-message-id="${messageId}"]`);
            const oldText = messageEl.querySelector('div').innerText;
            const newText = prompt('Edit message:', oldText);
            if (newText && newText !== oldText) {
                socket.emit('edit_message', {
                    message_id: messageId,
                    new_content: newText,
                    user_id: currentUser.id,
                    chat_with: currentChatUser.id
                });
            }
        }

        function deleteMessage(messageId) {
            if (confirm('Delete this message?')) {
                socket.emit('delete_message', {
                    message_id: messageId,
                    user_id: currentUser.id,
                    chat_with: currentChatUser.id
                });
                const msgIndex = currentMessages.findIndex(m => m.id === messageId);
                if (msgIndex !== -1) {
                    currentMessages.splice(msgIndex, 1);
                    renderMessages();
                }
            }
        }

        function addReaction(messageId, reaction) {
            socket.emit('add_reaction', {
                message_id: messageId,
                reaction: reaction,
                user_id: currentUser.id,
                chat_with: currentChatUser.id
            });
        }

        function sendMessage() {
            if (!currentChatUser) {
                alert('Select a friend first');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            if (isTextSending) return;
            isTextSending = true;
            
            socket.emit('private_message', {
                from_user_id: currentUser.id,
                to_user_id: currentChatUser.id,
                message: { type: 'text', content: text }
            });
            messageInput.value = '';
            updateActionButton();
            
            setTimeout(() => {
                isTextSending = false;
            }, 500);
        }

        async function uploadAndSend(file, type) {

            const formData = new FormData();
            formData.append('file', file);

            if (res.ok) {
                socket.emit('private_message', {
                    from_user_id: currentUser.id,
                    to_user_id: currentChatUser.id,
                    message: { type, content: data.url, name: data.name }
                });
            }
        }

        window.addFriend = async (friendId) => {
            try {
                const res = await fetch('/api/add_friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, friend_id: friendId })

                    else uploadAndSend(file, 'file');
                }
            };

        };

            friendsList = friends || [];
            renderFriends();

        socket.on('messages_history', (messages) => {

            const exists = currentMessages.some(m => m.id === data.message.id);

                if (currentChatUser && currentChatUser.id === data.from_user_id) {
                    renderMessages();

        socket.on('friend_added', () => loadFriends());

        socket.on('user_typing_private', (data) => {
            if (currentChatUser && currentChatUser.id === data.from_user_id) {
                typingIndicator.style.display = data.is_typing ? 'block' : 'none';
                typingIndicator.innerText = data.is_typing ? `${data.from_username} is typing...` : '';
            }
        });

        socket.on('message_edited', (data) => {
            const msgIndex = currentMessages.findIndex(m => m.id === data.message_id);
            if (msgIndex !== -1) {
                currentMessages[msgIndex].content = data.new_content;
                currentMessages[msgIndex].edited = true;
                renderMessages();
            }
        });

        socket.on('message_deleted', (data) => {
            const msgIndex = currentMessages.findIndex(m => m.id === data.message_id);
            if (msgIndex !== -1) {
                currentMessages.splice(msgIndex, 1);
                renderMessages();
            }
        });

        socket.on('reaction_added', (data) => {
            const msgIndex = currentMessages.findIndex(m => m.id === data.message_id);
            if (msgIndex !== -1) {
                if (!currentMessages[msgIndex].reactions) {
                    currentMessages[msgIndex].reactions = {};
                }
                currentMessages[msgIndex].reactions[data.by] = data.reaction;
                renderMessages();
            }
            loadFriends();
        });

        socket.on('unread_count', (data) => {
            const friend = friendsList.find(f => f.id === data.from);
            if (friend) {
                friend.unread = data.count;
                renderFriends();
            }
        });

        socket.on('messages_read', (data) => {
            if (currentChatUser && currentChatUser.id === data.by) {
                for (const msg of currentMessages) {
                    if (msg.from_id === currentUser.id && msg.status !== 'read') {
                        msg.status = 'read';
                    }
                }
                renderMessages();
            }
        });

        messageInput.addEventListener('input', updateActionButton);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        function escapeHtml(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        tryAutoLogin();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js').catch(console.error);
        }
    </script>
</body>
</html>
